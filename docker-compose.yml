services:
  engram:
    build: .
    container_name: engram
    restart: unless-stopped
    ports:
      - "127.0.0.1:4200:4200"
    volumes:
      - ./data:/app/data
    environment:
      - ENGRAM_PORT=4200
      - ENGRAM_HOST=0.0.0.0
      # - ENGRAM_OPEN_ACCESS=1         # Uncomment for no-auth mode
      # - ENGRAM_HMAC_SECRET=changeme  # GUI session secret
      # - ENGRAM_GUI_PASSWORD=changeme # GUI login password
      # - LLM_URL=                     # Optional LLM for reranking
      # - LLM_API_KEY=
      # - LLM_MODEL=
