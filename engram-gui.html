      freq2: 1.2 + Math.random() * 7.0,
      flickerAmt: Math.random() * 0.35
    });
  }

  for (var i = 0; i < DUST_COUNT; i++) {
    var spr = new PIXI.Sprite(particleTex);
    spr.anchor.set(0.5);
    spr.blendMode = PIXI.BLEND_MODES.ADD;
    spr.tint = STAR_COLORS[Math.random() * STAR_COLORS.length | 0];
    var size = 1.2 + Math.random() * 4.0;
    spr.scale.set(size / 32);
    spr.position.set(Math.random() * screenW, Math.random() * screenH);
    dustLayer.addChild(spr);
    dustParts.push({
      sprite: spr,
      baseX: spr.x, baseY: spr.y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 3,
      baseAlpha: 0.02 + Math.random() * 0.08,
      freq: 0.08 + Math.random() * 0.35,
      phase: Math.random() * Math.PI * 2,
      parallax: 0.01 + Math.random() * 0.04
    });
  }

  for (var i = 0; i < SHOOTING_STAR_POOL; i++) {
    var head = new PIXI.Sprite(glowTex);
    head.anchor.set(0.5);
    head.blendMode = PIXI.BLEND_MODES.ADD;
    head.visible = false;
    shootHeadLayer.addChild(head);
    var flash = new PIXI.Sprite(glowTex);
    flash.anchor.set(0.5);
    flash.blendMode = PIXI.BLEND_MODES.ADD;
    flash.visible = false;
    shootHeadLayer.addChild(flash);
    shootPool.push({
      active: false, x: 0, y: 0, startX: 0, startY: 0,
      vx: 0, vy: 0, life: 0, maxLife: 0,
      brightness: 0, color: 0xeef0ff,
      head: head, flash: flash
    });
  }
  nextShootTime = time + rng(0.5, 2);
}

// ===== Layout Engine =====
function computeLayout() {
  var cx = screenW / 2, cy = screenH / 2;
  centerPos = { x: cx, y: cy };

  var catGroups = {};
  var catList = Object.keys(COLORS);
  catList.forEach(function(c) { catGroups[c] = []; });
  memories.forEach(function(m) {
    var cat = m.category || 'general';
    if (!catGroups[cat]) catGroups[cat] = [];
    catGroups[cat].push(m);
  });

  var activeCats = catList.filter(function(c) { return catGroups[c] && catGroups[c].length > 0; });
  nuclei = {};
  nucleiOrbitData = {};
  trunkSegs = [];

  for (var i = 0; i < activeCats.length; i++) {
    var cat = activeCats[i];
    var angle = (i / activeCats.length) * Math.PI * 2 - Math.PI / 2;
    var nx = cx + Math.cos(angle) * NUCLEUS_R;
    var ny = cy + Math.sin(angle) * NUCLEUS_R;
    nuclei[cat] = { x: nx, y: ny, angle: angle, count: catGroups[cat].length };

    // Orbital params for nucleus
    var dir = Math.sin(i * 3.7 + 0.5) > 0 ? 1 : -1;
    nucleiOrbitData[cat] = {
      baseAngle: angle,
      angSpeed: NUCLEUS_ORBIT_SPEED * (0.8 + Math.sin(i * 2.7) * 0.4) * dir
    };

    // Trunk segment (dynamic endpoints via getSegPts)
    var curvature = 25 + Math.sin(i * 1.7) * 15;
    trunkSegs.push({ _isTrunk: true, _curveOff: curvature, col: COLORS[cat], cat: cat });
  }

  nodePositions = {};
  orbitData = {};
  nodeProcessOrder = [];
  branchSegs = [];

  activeCats.forEach(function(cat) {
    var mems = catGroups[cat];
    if (!mems || mems.length === 0) return;
    var nuc = nuclei[cat];
    var col = COLORS[cat] || COLORS.general;

    var childrenOf = {}, hasParent = {};
    mems.forEach(function(m) {
      if (m.parent_memory_id && nodeMap[m.parent_memory_id]) {
        var parent = nodeMap[m.parent_memory_id];
        if (parent.category === cat) {
          if (!childrenOf[m.parent_memory_id]) childrenOf[m.parent_memory_id] = [];
          childrenOf[m.parent_memory_id].push(m);
          hasParent[m.id] = true;
        }
      }
    });

    var roots = mems.filter(function(m) { return !hasParent[m.id]; });
    roots.sort(function(a, b) { return (b.importance || 0) - (a.importance || 0); });

    var outwardAngle = nuc.angle;
    for (var ri = 0; ri < roots.length; ri++) {
      var root = roots[ri];
      var spiralAngle = outwardAngle + GOLDEN_ANGLE * ri;
      var baseR = 50 + Math.sqrt(ri) * 18;
      var noise = Math.sin(root.id * 3.7) * 8;
      var dist = baseR + noise;
      var rx = nuc.x + Math.cos(spiralAngle) * dist;
      var ry = nuc.y + Math.sin(spiralAngle) * dist;
      nodePositions[root.id] = { x: rx, y: ry, depth: 0 };

      // Orbital params
      var rDir = Math.sin(root.id * 3.1) > 0 ? 1 : -1;
      orbitData[root.id] = {
        parentType: 'nucleus', parentKey: cat,
        baseAngle: spiralAngle, baseDist: dist,
        angSpeed: ROOT_ORBIT_SPEED * (0.6 + Math.sin(root.id * 1.3) * 0.5) * rDir
      };
      nodeProcessOrder.push(root.id);

      var bCurve = dist * 0.2 * (Math.sin(root.id * 2.1) > 0 ? 1 : -1);
      branchSegs.push({ _isTrunk: false, _curveOff: bCurve, col: col, depth: 0, fromId: null, toId: root.id, cat: cat });

      placeChildren(root.id, rx, ry, spiralAngle, dist, 1, col, cat, childrenOf);
    }
  });

  initParticles();
}

function placeChildren(parentId, px, py, parentAngle, parentDist, depth, col, cat, childrenOf) {
  var children = childrenOf[parentId];
  if (!children || children.length === 0) return;
  var spreadNarrow = Math.PI * 0.6 / Math.pow(1.5, depth);
  var childDist = 35 + 10 / (depth + 1);
  for (var ci = 0; ci < children.length; ci++) {
    var child = children[ci];
    var childAngle = children.length === 1
      ? parentAngle + Math.sin(child.id * 1.3) * 0.15
      : parentAngle - spreadNarrow / 2 + (ci / (children.length - 1)) * spreadNarrow;
    var cNoise = Math.sin(child.id * 4.3) * 5;
    var actualDist = childDist + cNoise;
    var cxp = px + Math.cos(childAngle) * actualDist;
    var cyp = py + Math.sin(childAngle) * actualDist;
    nodePositions[child.id] = { x: cxp, y: cyp, depth: depth };

    // Orbital params — slower at deeper levels
    var cDir = Math.sin(child.id * 2.7) > 0 ? 1 : -1;
    orbitData[child.id] = {
      parentType: 'node', parentKey: parentId,
      baseAngle: childAngle, baseDist: actualDist,
      angSpeed: CHILD_ORBIT_SPEED * (0.5 + Math.sin(child.id * 2.1) * 0.5) * cDir / (1 + depth * 0.3)
    };
    nodeProcessOrder.push(child.id);

    var bCurve = actualDist * 0.15 * (Math.sin(child.id * 1.9) > 0 ? 1 : -1);
    branchSegs.push({ _isTrunk: false, _curveOff: bCurve, col: col, depth: depth, fromId: parentId, toId: child.id, cat: cat });

    placeChildren(child.id, cxp, cyp, childAngle, actualDist, depth + 1, col, cat, childrenOf);
  }
}

function initParticles() {
  branchParticles = [];
  var total = branchSegs.length + trunkSegs.length;
  if (total === 0) return;
  var maxP = Math.min(total * 1.5, MAX_BRANCH_PARTICLES) | 0;
  for (var i = 0; i < maxP; i++) {
    var isTrunk = trunkSegs.length > 0 && Math.random() < 0.25;
    branchParticles.push({
      isTrunk: isTrunk,
      segIdx: isTrunk ? (Math.random() * trunkSegs.length | 0) : (Math.random() * branchSegs.length | 0),
      t: Math.random(),
      speed: 0.002 + Math.random() * 0.004,
      size: 0.6 + Math.random() * 0.8,
      alpha: 0.15 + Math.random() * 0.25
    });
  }
}

// ===== Animated Position Computation =====
function computeAnimatedPositions() {
  // Hub wobble
  centerAnimPos.x = centerPos.x + Math.sin(time * 0.15) * HUB_WOBBLE + Math.sin(time * 0.31) * HUB_WOBBLE * 0.5;
  centerAnimPos.y = centerPos.y + Math.cos(time * 0.19) * HUB_WOBBLE + Math.cos(time * 0.37) * HUB_WOBBLE * 0.5;

  // Nuclei orbit center
  var ck = Object.keys(nucleiOrbitData);
  for (var i = 0; i < ck.length; i++) {
    var cat = ck[i], od = nucleiOrbitData[cat];
    var a = od.baseAngle + od.angSpeed * time;
    nucleiAnimPos[cat] = {
      x: centerAnimPos.x + Math.cos(a) * NUCLEUS_R,
      y: centerAnimPos.y + Math.sin(a) * NUCLEUS_R
    };
  }

  // Nodes orbit in parent-first order
  for (var i = 0; i < nodeProcessOrder.length; i++) {
    var id = nodeProcessOrder[i];
    var od = orbitData[id];
    if (!od) {
      var bp = nodePositions[id];
      nodeAnimPos[id] = bp ? { x: bp.x, y: bp.y } : { x: 0, y: 0 };
      continue;
    }
    var a = od.baseAngle + od.angSpeed * time;
    var pcx, pcy;
    if (od.parentType === 'nucleus') {
      var nap = nucleiAnimPos[od.parentKey];
      pcx = nap ? nap.x : centerAnimPos.x;
      pcy = nap ? nap.y : centerAnimPos.y;
    } else {
      var pap = nodeAnimPos[od.parentKey];
      pcx = pap ? pap.x : centerAnimPos.x;
      pcy = pap ? pap.y : centerAnimPos.y;
    }
    nodeAnimPos[id] = { x: pcx + Math.cos(a) * od.baseDist, y: pcy + Math.sin(a) * od.baseDist };
  }
}

function getHighlightPath(memId) {
  var path = [], visited = {}, cur = memId;
  while (cur && !visited[cur]) {
    visited[cur] = true;
    var found = false;
    for (var i = 0; i < branchSegs.length; i++) {
      if (branchSegs[i].toId === cur) { path.push(i); cur = branchSegs[i].fromId; found = true; break; }
    }
    if (!found) break;
  }
  return path;
}

// ===== Scene Building =====
function clearScene() {
  var layers = [glowLayer, orbLayer, coronaLayer, particleLayer, orbitLayer, sparkLayer];
  for (var l = 0; l < layers.length; l++) {
    var ch = layers[l].removeChildren();
    for (var i = 0; i < ch.length; i++) ch[i].destroy();
  }
  var texts = labelLayer.removeChildren();
  for (var i = 0; i < texts.length; i++) texts[i].destroy(true);
  curvesGfx.clear();
  overlayGfx.clear();
  pulseGfx.clear();
  nodeSprites = {};
  nucleiSprites = {};
  coronaSprites = {};
  nucLabels = {};
  hubGlow = null; hubOrb = null; hubCorona = null; hubLabel = null;
  orbitParts = [];
  pulseRings = [];
  nodeSparks = [];
  energyPulses = [];
  energyPulsePool = [];
  nextPulseTime = {};
}

function buildScene() {
  clearScene();

  // Recompute highlight path
  hlSet = {}; hlIndexSet = {};
  if (selectedNode) {
    var hlIndices = getHighlightPath(selectedNode.id);
    for (var i = 0; i < hlIndices.length; i++) {
      hlIndexSet[hlIndices[i]] = true;
      var seg = branchSegs[hlIndices[i]];
      hlSet[seg.toId] = true;
      if (seg.fromId) hlSet[seg.fromId] = true;
    }
  }

  // ===== Center Hub =====
  hubGlow = new PIXI.Sprite(glowTex);
  hubGlow.anchor.set(0.5);
  hubGlow.tint = 0xf0e0c0;
  hubGlow.blendMode = PIXI.BLEND_MODES.ADD;
  hubGlow.position.set(centerAnimPos.x, centerAnimPos.y);
  glowLayer.addChild(hubGlow);

  hubOrb = new PIXI.Sprite(orbTex);
  hubOrb.anchor.set(0.5);
  hubOrb.tint = 0xf0e0c0;
  hubOrb.position.set(centerAnimPos.x, centerAnimPos.y);
  orbLayer.addChild(hubOrb);

  hubCorona = new PIXI.Sprite(coronaTex);
  hubCorona.anchor.set(0.5);
  hubCorona.tint = 0xf0e0c0;
  hubCorona.blendMode = PIXI.BLEND_MODES.ADD;
  hubCorona.position.set(centerAnimPos.x, centerAnimPos.y);
  coronaLayer.addChild(hubCorona);

  hubLabel = new PIXI.Text('ENGRAM', {
    fontFamily: 'Inter, sans-serif', fontSize: 20, fontWeight: '500', fill: 0xf0e0c0
  });
  hubLabel.anchor.set(0.5, 0);
  hubLabel.position.set(centerAnimPos.x, centerAnimPos.y + CENTER_HUB_R + 4);
  labelLayer.addChild(hubLabel);

  // Hub orbit particles
  for (var i = 0; i < ORBIT_PER_HUB; i++) {
    var spr = new PIXI.Sprite(particleTex);
    spr.anchor.set(0.5);
    spr.blendMode = PIXI.BLEND_MODES.ADD;
    spr.tint = 0xf0e0c0;
    orbitLayer.addChild(spr);
    orbitParts.push({
      cx: centerAnimPos.x, cy: centerAnimPos.y,
      angle: (i / ORBIT_PER_HUB) * Math.PI * 2,
      speed: 0.25 + Math.random() * 0.35,
      radiusX: CENTER_HUB_R * (2.2 + Math.random() * 1.8),
      radiusY: CENTER_HUB_R * (1.2 + Math.random() * 1.8),
      tilt: Math.random() * Math.PI * 0.35,
      size: 1.0 + Math.random() * 1.8,
      alpha: 0.25 + Math.random() * 0.35,
      sprite: spr, isHub: true, cat: null
    });
  }
  nextPulseTime['__hub'] = time + rng(1, 4);

  // ===== Category Nuclei =====
  var catKeys = Object.keys(nuclei);
  for (var ni = 0; ni < catKeys.length; ni++) {
    var cat = catKeys[ni];
    var nap = nucleiAnimPos[cat] || nuclei[cat];
    var col = COLORS[cat];

    var ng = new PIXI.Sprite(glowTex);
    ng.anchor.set(0.5);
    ng.tint = col.hex;
    ng.blendMode = PIXI.BLEND_MODES.ADD;
    ng.position.set(nap.x, nap.y);
    glowLayer.addChild(ng);

    var no = new PIXI.Sprite(orbTex);
    no.anchor.set(0.5);
    no.tint = col.hex;
    no.position.set(nap.x, nap.y);
    orbLayer.addChild(no);

    var nc = new PIXI.Sprite(coronaTex);
    nc.anchor.set(0.5);
    nc.tint = col.hex;
    nc.blendMode = PIXI.BLEND_MODES.ADD;
    nc.position.set(nap.x, nap.y);
    coronaLayer.addChild(nc);

    nucleiSprites[cat] = { glow: ng, orb: no, corona: nc };

    var nameLabel = new PIXI.Text(cat.toUpperCase(), {
      fontFamily: 'Inter, sans-serif', fontSize: 20, fontWeight: '600', fill: col.hex
    });
    nameLabel.anchor.set(0.5, 0);
    nameLabel.position.set(nap.x, nap.y + NUCLEUS_ORB_R + 4);
    labelLayer.addChild(nameLabel);

    var countLabel = new PIXI.Text(nuclei[cat].count + ' memories', {
      fontFamily: 'JetBrains Mono, monospace', fontSize: 16, fill: col.hex
    });
    countLabel.anchor.set(0.5, 0);
    countLabel.position.set(nap.x, nap.y + NUCLEUS_ORB_R + 22);
    labelLayer.addChild(countLabel);

    nucLabels[cat] = { name: nameLabel, count: countLabel };

    // Nucleus orbit particles
    for (var oi = 0; oi < ORBIT_PER_NUCLEUS; oi++) {
      var ospr = new PIXI.Sprite(particleTex);
      ospr.anchor.set(0.5);
      ospr.blendMode = PIXI.BLEND_MODES.ADD;
      ospr.tint = col.hex;
      orbitLayer.addChild(ospr);
      orbitParts.push({
        cx: nap.x, cy: nap.y,
        angle: (oi / ORBIT_PER_NUCLEUS) * Math.PI * 2,
        speed: 0.35 + Math.random() * 0.45,
        radiusX: NUCLEUS_ORB_R * (1.8 + Math.random() * 2.2),
        radiusY: NUCLEUS_ORB_R * (1.0 + Math.random() * 2.0),
        tilt: Math.random() * Math.PI * 0.4,
        size: 0.7 + Math.random() * 1.3,
        alpha: 0.2 + Math.random() * 0.3,
        sprite: ospr, isHub: false, cat: cat
      });
    }
    nextPulseTime[cat] = time + rng(0.5, PULSE_MAX);
  }

  // ===== Memory Nodes =====
  for (var mi = 0; mi < memories.length; mi++) {
    var m = memories[mi];
    var ap = nodeAnimPos[m.id] || nodePositions[m.id];
    if (!ap) continue;
    var col = COLORS[m.category] || COLORS.general;

    var mg = new PIXI.Sprite(glowTex);
    mg.anchor.set(0.5);
    mg.tint = col.hex;
    mg.blendMode = PIXI.BLEND_MODES.ADD;
    mg.position.set(ap.x, ap.y);
    glowLayer.addChild(mg);

    var mo = new PIXI.Sprite(orbTex);
    mo.anchor.set(0.5);
    mo.tint = col.hex;
    mo.position.set(ap.x, ap.y);
    orbLayer.addChild(mo);

    var mc = new PIXI.Sprite(coronaTex);
    mc.anchor.set(0.5);
    mc.tint = col.hex;
    mc.blendMode = PIXI.BLEND_MODES.ADD;
    mc.position.set(ap.x, ap.y);
    coronaLayer.addChild(mc);

    nodeSprites[m.id] = { glow: mg, orb: mo, corona: mc };
  }

  // ===== Branch Particle Sprites =====
  for (var pi = 0; pi < branchParticles.length; pi++) {
    var ps = new PIXI.Sprite(particleTex);
    ps.anchor.set(0.5);
    ps.blendMode = PIXI.BLEND_MODES.ADD;
    ps.visible = false;
    particleLayer.addChild(ps);
    branchParticles[pi].sprite = ps;
  }

  // ===== Energy Pulse Sprite Pool =====
  energyPulsePool = [];
  for (var i = 0; i < MAX_ENERGY_PULSES; i++) {
    var eps = new PIXI.Sprite(glowTex);
    eps.anchor.set(0.5);
    eps.blendMode = PIXI.BLEND_MODES.ADD;
    eps.visible = false;
    particleLayer.addChild(eps);
    energyPulsePool.push(eps);
  }
}

// ===== Update Functions =====

function updateStars() {
  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    var twinkle = 0.35 + 0.65 * Math.sin(time * s.freq + s.phase);
    var flicker = 1 - s.flickerAmt + s.flickerAmt * Math.sin(time * s.freq2 + s.phase * 2.3);
    s.sprite.alpha = s.baseAlpha * twinkle * flicker;
  }
}

function updateNebulaDrifts(dt) {
  for (var i = 0; i < nebulaDrifts.length; i++) {
    var n = nebulaDrifts[i];
    n.baseX += n.vx * dt;
    n.baseY += n.vy * dt;
    // Wrap around screen edges with generous margin
    var margin = 200;
    if (n.baseX < -margin) n.baseX = screenW + margin;
    if (n.baseX > screenW + margin) n.baseX = -margin;
    if (n.baseY < -margin) n.baseY = screenH + margin;
    if (n.baseY > screenH + margin) n.baseY = -margin;
    n.sprite.x = n.baseX;
    n.sprite.y = n.baseY;
    n.sprite.rotation += n.rotSpeed * dt;
    // Breathing alpha
    n.sprite.alpha = n.baseAlpha * (0.5 + 0.5 * Math.sin(time * n.freq + n.phase));
    // Subtle scale breathing
    var scalePulse = 1 + 0.06 * Math.sin(time * n.scaleFreq + n.scalePhase);
    n.sprite.scale.set(n.baseScale * scalePulse);
  }
}

function updateDust(dt) {
  for (var i = 0; i < dustParts.length; i++) {
    var d = dustParts[i];
    d.baseX += d.vx * dt;
    d.baseY += d.vy * dt;
    if (d.baseX < -30) d.baseX = screenW + 30;
    if (d.baseX > screenW + 30) d.baseX = -30;
    if (d.baseY < -30) d.baseY = screenH + 30;
    if (d.baseY > screenH + 30) d.baseY = -30;
    d.sprite.x = d.baseX - transform.x * d.parallax;
    d.sprite.y = d.baseY - transform.y * d.parallax;
    d.sprite.alpha = d.baseAlpha * (0.4 + 0.6 * Math.sin(time * d.freq + d.phase));
  }
}

function launchShootingStar(ss) {
  ss.active = true;
  ss.color = SHOOT_COLORS[Math.random() * SHOOT_COLORS.length | 0];
  ss.maxLife = rng(0.6, 1.8);
  ss.life = ss.maxLife;
  ss.brightness = rng(0.5, 1.0);
  var edge = Math.random() * 4 | 0;
  var angle;
  if (edge === 0) { ss.x = Math.random() * screenW; ss.y = -10; angle = rng(0.3, 2.8); }
  else if (edge === 1) { ss.x = screenW + 10; ss.y = Math.random() * screenH; angle = rng(1.8, 4.3); }
  else if (edge === 2) { ss.x = Math.random() * screenW; ss.y = screenH + 10; angle = rng(3.5, 5.8); }
  else { ss.x = -10; ss.y = Math.random() * screenH; angle = rng(-0.8, 0.8); }
  var speed = rng(350, 900);
  ss.vx = Math.cos(angle) * speed;
  ss.vy = Math.sin(angle) * speed;
  ss.startX = ss.x;
  ss.startY = ss.y;
}

function updateShootingStars(dt) {
  if (time > nextShootTime) {
    for (var i = 0; i < shootPool.length; i++) {
      if (!shootPool[i].active) { launchShootingStar(shootPool[i]); break; }
    }
    nextShootTime = time + rng(SHOOT_MIN, SHOOT_MAX);
  }
  shootGfx.clear();
  for (var i = 0; i < shootPool.length; i++) {
    var ss = shootPool[i];
    if (!ss.active) { ss.head.visible = false; ss.flash.visible = false; continue; }
    ss.life -= dt;
    if (ss.life <= 0) { ss.active = false; ss.head.visible = false; ss.flash.visible = false; continue; }
    ss.x += ss.vx * dt;
    ss.y += ss.vy * dt;
    var lifeRatio = ss.life / ss.maxLife;
    var fadeIn = Math.min(1, (ss.maxLife - ss.life) / 0.1);
    var fadeOut = lifeRatio < 0.25 ? lifeRatio / 0.25 : 1;
    var alpha = fadeIn * fadeOut * ss.brightness;
    ss.head.visible = true;
    ss.head.position.set(ss.x, ss.y);
    ss.head.tint = ss.color;
    ss.head.scale.set(0.1 + alpha * 0.06);
    ss.head.alpha = alpha * 0.9;
    var flashAge = ss.maxLife - ss.life;
    if (flashAge < 0.3) {
      ss.flash.visible = true;
      ss.flash.position.set(ss.startX, ss.startY);
      ss.flash.tint = 0xffffff;
      var flashAlpha = (1 - flashAge / 0.3) * ss.brightness * 0.6;
      ss.flash.scale.set(0.15 * flashAlpha);
      ss.flash.alpha = flashAlpha;
    } else {
      ss.flash.visible = false;
    }
    var speed = Math.sqrt(ss.vx * ss.vx + ss.vy * ss.vy);
    var trailLen = speed * 0.18 * fadeOut;
    var ddx = -ss.vx / speed, ddy = -ss.vy / speed;
    var segments = 8;
    for (var s = 0; s < segments; s++) {
      var t0 = s / segments, t1 = (s + 1) / segments;
      var segAlpha = alpha * (1 - t1) * (1 - t0) * 0.6;
      if (segAlpha < 0.003) continue;
      var w = (2.5 - t0 * 2.0) * (0.5 + alpha * 0.5);
      shootGfx.lineStyle(Math.max(0.3, w), ss.color, segAlpha);
      shootGfx.moveTo(ss.x + ddx * trailLen * t0, ss.y + ddy * trailLen * t0);
      shootGfx.lineTo(ss.x + ddx * trailLen * t1, ss.y + ddy * trailLen * t1);
    }
  }
}

function updateGrid() {
  gridGfx.clear();
  var gridSpacing = GRID_SPACING_BASE * transform.k;
  if (gridSpacing <= 20) return;
  var offsetX = transform.x % gridSpacing;
  var offsetY = transform.y % gridSpacing;
  if (offsetX < 0) offsetX += gridSpacing;
  if (offsetY < 0) offsetY += gridSpacing;
  gridGfx.lineStyle(1, 0x94a3b8, 0.025);
  for (var gx = offsetX; gx < screenW; gx += gridSpacing) {
    gridGfx.moveTo(gx, 0); gridGfx.lineTo(gx, screenH);
  }
  for (var gy = offsetY; gy < screenH; gy += gridSpacing) {
    gridGfx.moveTo(0, gy); gridGfx.lineTo(screenW, gy);
  }
}

// Dynamic curves using animated positions
function updateCurves(phaseTrunk, phaseBranch, dimEased) {
  curvesGfx.clear();
  var trunkAlpha = easeOutExpo(phaseTrunk);
  var branchAlpha = easeOutExpo(phaseBranch);

  // Trunk curves
  for (var ti = 0; ti < trunkSegs.length; ti++) {
    var ts = trunkSegs[ti];
    if (currentFilter !== 'all' && ts.cat !== currentFilter) continue;
    var tA = trunkAlpha * 0.3;
    if (selectedNode && ts.cat !== selectedNode.category) tA *= (1 - dimEased * 0.85);
    if (tA < 0.005) continue;
    var pts = getSegPts(ts);
    // Trunk glow
    curvesGfx.lineStyle(3.5 / transform.k, ts.col.hex, tA * 0.15);
    curvesGfx.moveTo(pts.x1, pts.y1);
    curvesGfx.quadraticCurveTo(pts.cx, pts.cy, pts.x2, pts.y2);
    // Trunk core
    curvesGfx.lineStyle(1.8 / transform.k, ts.col.hex, tA);
    curvesGfx.moveTo(pts.x1, pts.y1);
    curvesGfx.quadraticCurveTo(pts.cx, pts.cy, pts.x2, pts.y2);
  }

  // Branch curves
  for (var bi = 0; bi < branchSegs.length; bi++) {
    var bs = branchSegs[bi];
    if (currentFilter !== 'all' && bs.cat !== currentFilter) continue;
    var isHL = hlIndexSet[bi] || false;
    var bA = branchAlpha * 0.2 / (1 + bs.depth * 0.3);
    if (selectedNode) {
      if (isHL) bA = 0.7;
      else bA *= (1 - dimEased * 0.88);
    }
    if (bA < 0.005) continue;
    var pts = getSegPts(bs);

    if (isHL) {
      curvesGfx.lineStyle(5 / transform.k, bs.col.hex, 0.12);
      curvesGfx.moveTo(pts.x1, pts.y1);
      curvesGfx.quadraticCurveTo(pts.cx, pts.cy, pts.x2, pts.y2);
      curvesGfx.lineStyle(1.5 / transform.k, bs.col.hex, bA);
      curvesGfx.moveTo(pts.x1, pts.y1);
      curvesGfx.quadraticCurveTo(pts.cx, pts.cy, pts.x2, pts.y2);
    } else {
      curvesGfx.lineStyle(Math.max(0.5, 1.0 - bs.depth * 0.12) / transform.k, bs.col.hex, bA);
      curvesGfx.moveTo(pts.x1, pts.y1);
      curvesGfx.quadraticCurveTo(pts.cx, pts.cy, pts.x2, pts.y2);
    }

    // Endpoint glow dot at node
    if (bA > 0.05) {
      curvesGfx.lineStyle(0);
      curvesGfx.beginFill(bs.col.hex, bA * 0.35);
      curvesGfx.drawCircle(pts.x2, pts.y2, 1.5 / transform.k);
      curvesGfx.endFill();
    }
  }
}

// Branch particles using dynamic positions
function updateParticles(entryEased, dimEased) {
  for (var pi = 0; pi < branchParticles.length; pi++) {
    var bp = branchParticles[pi];
    var spr = bp.sprite;
    if (!spr) continue;

    bp.t += bp.speed;
    if (bp.t > 1) {
      bp.t -= 1;
      bp.segIdx = bp.isTrunk
        ? (Math.random() * trunkSegs.length | 0)
        : (Math.random() * branchSegs.length | 0);
    }

    var seg = bp.isTrunk ? trunkSegs[bp.segIdx] : branchSegs[bp.segIdx];
    if (!seg) { spr.visible = false; continue; }
    if (currentFilter !== 'all' && seg.cat !== currentFilter) { spr.visible = false; continue; }

    var pts = getSegPts(seg);
    var pt = bezierPt(pts.x1, pts.y1, pts.cx, pts.cy, pts.x2, pts.y2, bp.t);
    var fadeT = Math.min(bp.t, 1 - bp.t) * 4;
    var pAlpha = bp.alpha * Math.min(1, fadeT) * entryEased;
    if (selectedNode && seg.cat !== selectedNode.category) pAlpha *= 0.08;
    if (pAlpha < 0.02) { spr.visible = false; continue; }

    spr.visible = true;
    spr.position.set(pt.x, pt.y);
    spr.tint = seg.col.hex;
    var pScale = bp.size * 2 / 32;
    spr.scale.set(pScale / transform.k);
    spr.alpha = pAlpha;
  }
}

// Energy pulses — bright signals traveling along connections
function updateEnergyPulses(dt, entryEased, dimEased) {
  // Spawn
  if (entryEased > 0.8 && energyPulses.length < MAX_ENERGY_PULSES) {
    var allLen = branchSegs.length + trunkSegs.length;
    if (allLen > 0) {
      for (var attempt = 0; attempt < 2; attempt++) {
        if (Math.random() < 0.12 * dt * 60) {
          var idx = Math.random() * allLen | 0;
          var isTrunk = idx >= branchSegs.length;
          var sIdx = isTrunk ? idx - branchSegs.length : idx;
          var seg = isTrunk ? trunkSegs[sIdx] : branchSegs[sIdx];
          if (!seg || (currentFilter !== 'all' && seg.cat !== currentFilter)) continue;
          var freeSpr = null;
          for (var j = 0; j < energyPulsePool.length; j++) {
            if (!energyPulsePool[j].visible) { freeSpr = energyPulsePool[j]; break; }
          }
          if (!freeSpr) break;
          energyPulses.push({
            segIdx: sIdx, isTrunk: isTrunk,
            t: 0, speed: 0.4 + Math.random() * 0.5,
            sprite: freeSpr, cat: seg.cat
          });
        }
      }
    }
  }

  // Update
  for (var i = energyPulses.length - 1; i >= 0; i--) {
    var ep = energyPulses[i];
    ep.t += ep.speed * dt;
    if (ep.t >= 1) { ep.sprite.visible = false; energyPulses.splice(i, 1); continue; }

    var seg = ep.isTrunk ? trunkSegs[ep.segIdx] : branchSegs[ep.segIdx];
    if (!seg) { ep.sprite.visible = false; energyPulses.splice(i, 1); continue; }

    var pts = getSegPts(seg);
    var pt = bezierPt(pts.x1, pts.y1, pts.cx, pts.cy, pts.x2, pts.y2, ep.t);
    var fadeT = Math.min(ep.t * 5, (1 - ep.t) * 5, 1);
    var alpha = fadeT * 0.55 * entryEased;
    if (selectedNode && seg.cat !== selectedNode.category) alpha *= 0.1;

    ep.sprite.visible = alpha > 0.02;
    ep.sprite.position.set(pt.x, pt.y);
    ep.sprite.tint = (COLORS[seg.cat] || COLORS.general).hex;
    ep.sprite.scale.set((0.06 + alpha * 0.03) / transform.k);
    ep.sprite.alpha = alpha;
  }
}

// Pulse rings using animated positions
function updatePulseRings(entryEased, dimEased) {
  var catKeys = Object.keys(nuclei);
  for (var ni = 0; ni < catKeys.length; ni++) {
    var cat = catKeys[ni];
    if (nextPulseTime[cat] && time > nextPulseTime[cat] && pulseRings.length < MAX_PULSE_RINGS) {
      if (currentFilter === 'all' || cat === currentFilter) {
        var nap = nucleiAnimPos[cat];
        if (nap) {
          pulseRings.push({
            x: nap.x, y: nap.y,
            startR: NUCLEUS_ORB_R,
            maxR: NUCLEUS_ORB_R + 55 + Math.random() * 50,
            duration: 1.8 + Math.random() * 1.2,
            born: time, color: COLORS[cat].hex, cat: cat
          });
        }
      }
      nextPulseTime[cat] = time + rng(PULSE_MIN, PULSE_MAX);
    }
  }
  if (nextPulseTime['__hub'] && time > nextPulseTime['__hub'] && pulseRings.length < MAX_PULSE_RINGS) {
    pulseRings.push({
      x: centerAnimPos.x, y: centerAnimPos.y,
      startR: CENTER_HUB_R,
      maxR: CENTER_HUB_R + 70 + Math.random() * 50,
      duration: 2.2 + Math.random() * 1.0,
      born: time, color: 0xa78bfa, cat: '__hub'
    });
    nextPulseTime['__hub'] = time + rng(3.5, 6);
  }

  pulseGfx.clear();
  for (var i = pulseRings.length - 1; i >= 0; i--) {
    var ring = pulseRings[i];
    var age = time - ring.born;
    var progress = age / ring.duration;
    if (progress >= 1) { pulseRings.splice(i, 1); continue; }
    var r = ring.startR + (ring.maxR - ring.startR) * easeOutCubic(progress);
    var alpha = (1 - progress * progress) * 0.3 * entryEased;
    if (selectedNode && ring.cat !== selectedNode.category && ring.cat !== '__hub') {
      alpha *= (1 - dimEased * 0.85);
    }
    if (alpha < 0.004) continue;
    pulseGfx.lineStyle(3 / transform.k, ring.color, alpha * 0.3);
    pulseGfx.drawCircle(ring.x, ring.y, r);
    pulseGfx.lineStyle(1.2 / transform.k, ring.color, alpha);
    pulseGfx.drawCircle(ring.x, ring.y, r);
  }
}

// Orbit particles — follow animated centers
function updateOrbitParticles(dt, entryEased, dimEased) {
  for (var i = 0; i < orbitParts.length; i++) {
    var op = orbitParts[i];
    var spr = op.sprite;

    // Update orbit center to animated position
    if (op.isHub) {
      op.cx = centerAnimPos.x;
      op.cy = centerAnimPos.y;
    } else if (op.cat) {
      var nap = nucleiAnimPos[op.cat];
      if (nap) { op.cx = nap.x; op.cy = nap.y; }
    }

    if (op.cat && currentFilter !== 'all' && op.cat !== currentFilter) { spr.visible = false; continue; }

    op.angle += op.speed * dt;
    var ca = Math.cos(op.angle), sa = Math.sin(op.angle);
    var ct = Math.cos(op.tilt), st = Math.sin(op.tilt);
    var lx = ca * op.radiusX, ly = sa * op.radiusY;
    var wx = lx * ct - ly * st + op.cx;
    var wy = lx * st + ly * ct + op.cy;

    spr.position.set(wx, wy);
    var s = op.size * 2 / 32;
    spr.scale.set(s);
    var alpha = op.alpha * entryEased;
    alpha *= 0.5 + 0.5 * Math.sin(op.angle + 0.5);
    if (selectedNode) {
      if (!op.isHub && op.cat !== selectedNode.category) alpha *= (1 - dimEased * 0.85);
    }
    spr.alpha = alpha;
    spr.visible = alpha > 0.008;
  }
}

// Node sparks — emit from animated positions
function updateNodeSparks(dt, entryEased, dimEased) {
  if (entryEased > 0.8 && nodeSparks.length < MAX_NODE_SPARKS) {
    for (var mi = 0; mi < memories.length; mi++) {
      var m = memories[mi];
      if (!nodeVisible(m)) continue;
      var ap = nodeAnimPos[m.id];
      if (!ap) continue;
      var chance = NODE_SPARK_CHANCE * ((m.importance || 1) / 5);
      if (Math.random() > chance) continue;
      if (nodeSparks.length >= MAX_NODE_SPARKS) break;

      var col = COLORS[m.category] || COLORS.general;
      var angle = Math.random() * Math.PI * 2;
      var speed = 8 + Math.random() * 20;
      var spr = new PIXI.Sprite(sparkTex);
      spr.anchor.set(0.5);
      spr.blendMode = PIXI.BLEND_MODES.ADD;
      spr.tint = col.hex;
      sparkLayer.addChild(spr);

      nodeSparks.push({
        x: ap.x, y: ap.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0.6 + Math.random() * 1.0,
        maxLife: 0.6 + Math.random() * 1.0,
        size: 0.5 + Math.random() * 1.0,
        sprite: spr, cat: m.category
      });
    }
  }

  for (var i = nodeSparks.length - 1; i >= 0; i--) {
    var sp = nodeSparks[i];
    sp.life -= dt;
    if (sp.life <= 0) {
      sp.sprite.destroy();
      nodeSparks.splice(i, 1);
      continue;
    }
    sp.x += sp.vx * dt;
    sp.y += sp.vy * dt;
    sp.vx *= 0.97;
    sp.vy *= 0.97;
    var lifeRatio = sp.life / sp.maxLife;
    var alpha = lifeRatio * lifeRatio * 0.7 * entryEased;
    if (selectedNode && sp.cat !== selectedNode.category) alpha *= (1 - dimEased * 0.85);
    sp.sprite.position.set(sp.x, sp.y);
    sp.sprite.scale.set(sp.size * lifeRatio * 2 / 16);
    sp.sprite.alpha = alpha;
    sp.sprite.visible = alpha > 0.01;
  }
}

// Center hub — animated position + rotation
function updateHub(phaseCenter) {
  if (!hubGlow || !hubOrb) return;
  var alpha = easeOutExpo(phaseCenter);
  var pulse = 1
    + Math.sin(time * 0.8) * 0.08
    + Math.sin(time * 1.7) * 0.04
    + Math.sin(time * 3.1) * 0.02;
  var r = CENTER_HUB_R * pulse;

  var glowBreath = 1 + Math.sin(time * 0.5) * 0.22 + Math.sin(time * 1.3) * 0.08;
  var glowDiam = r * 16;
  hubGlow.position.set(centerAnimPos.x, centerAnimPos.y);
  hubGlow.scale.set(glowDiam / 128);
  hubGlow.alpha = alpha * 0.85 * glowBreath;

  var orbDiam = r * 2;
  hubOrb.position.set(centerAnimPos.x, centerAnimPos.y);
  hubOrb.scale.set(orbDiam / 128);
  hubOrb.alpha = alpha;
  hubOrb.rotation = time * 0.05;

  if (hubCorona) {
    hubCorona.position.set(centerAnimPos.x, centerAnimPos.y);
    hubCorona.rotation = time * 0.06;
    hubCorona.scale.set(r * 5.5 / 64);
    hubCorona.alpha = alpha * 0.45;
  }

  if (hubLabel) {
    hubLabel.visible = transform.k > 0.4;
    hubLabel.scale.set(0.5 / transform.k);
    hubLabel.alpha = 0.5 * alpha;
    hubLabel.position.set(centerAnimPos.x, centerAnimPos.y + r + 18 / transform.k);
  }
}

// Category nuclei — animated positions + rotation
function updateNuclei(phaseNuclei, dimEased) {
  var nucAlpha = easeOutExpo(phaseNuclei);
  var catKeys = Object.keys(nuclei);

  for (var ni = 0; ni < catKeys.length; ni++) {
    var cat = catKeys[ni];
    var nap = nucleiAnimPos[cat];
    if (!nap) continue;
    var ns = nucleiSprites[cat];
    if (!ns) continue;

    var vis = currentFilter === 'all' || cat === currentFilter;
    ns.glow.visible = vis;
    ns.orb.visible = vis;
    ns.corona.visible = vis;
    if (!vis) {
      if (nucLabels[cat]) { nucLabels[cat].name.visible = false; nucLabels[cat].count.visible = false; }
      continue;
    }

    var alpha = nucAlpha;
    if (selectedNode && selectedNode.category !== cat) alpha *= (1 - dimEased * 0.85);
    if (alpha < 0.01) {
      ns.glow.visible = false; ns.orb.visible = false; ns.corona.visible = false;
      if (nucLabels[cat]) { nucLabels[cat].name.visible = false; nucLabels[cat].count.visible = false; }
      continue;
    }

    var pulse = 1
      + Math.sin(time * 1.0 + ni * 1.5) * 0.08
      + Math.sin(time * 2.1 + ni * 2.3) * 0.04
      + Math.sin(time * 3.7 + ni * 0.7) * 0.02;
    var r = NUCLEUS_ORB_R * pulse;

    var glowBreath = 1 + Math.sin(time * 0.6 + ni * 0.9) * 0.22 + Math.sin(time * 1.8 + ni * 1.7) * 0.08;
    var glowDiam = r * 12;
    ns.glow.position.set(nap.x, nap.y);
    ns.glow.scale.set(glowDiam / 128);
    ns.glow.alpha = alpha * 0.85 * glowBreath;

    var orbDiam = r * 2;
    ns.orb.position.set(nap.x, nap.y);
    ns.orb.scale.set(orbDiam / 128);
    ns.orb.alpha = alpha;
    ns.orb.rotation = time * 0.08 * (ni % 2 === 0 ? 1 : -1);

    ns.corona.position.set(nap.x, nap.y);
    ns.corona.rotation = time * (0.1 + ni * 0.015) * (ni % 2 === 0 ? -1 : 1);
    ns.corona.scale.set(r * 4.5 / 64);
    ns.corona.alpha = alpha * 0.45;

    if (nucLabels[cat]) {
      var showLabels = transform.k > 0.3;
      nucLabels[cat].name.visible = showLabels;
      nucLabels[cat].count.visible = showLabels;
      if (showLabels) {
        nucLabels[cat].name.position.set(nap.x, nap.y + r + 14 / transform.k);
        nucLabels[cat].name.scale.set(0.45 / transform.k);
        nucLabels[cat].name.alpha = 0.7 * alpha;
        nucLabels[cat].count.position.set(nap.x, nap.y + r + 24 / transform.k);
        nucLabels[cat].count.scale.set(0.5 / transform.k);
        nucLabels[cat].count.alpha = 0.4 * alpha;
      }
    }
  }
}

// Memory nodes — animated positions + orb rotation + corona
function updateNodes(phaseNodes, dimEased) {
  for (var mi = 0; mi < memories.length; mi++) {
    var m = memories[mi];
    var ns = nodeSprites[m.id];
    if (!ns) continue;

    var vis = nodeVisible(m);
    ns.glow.visible = vis;
    ns.orb.visible = vis;
    ns.corona.visible = vis;
    if (!vis) continue;

    var ap = nodeAnimPos[m.id];
    if (!ap) { ns.glow.visible = false; ns.orb.visible = false; ns.corona.visible = false; continue; }

    var r = nodeRadius(m);
    var isSelected = selectedNode && selectedNode.id === m.id;
    var isHovered = hoveredNode && hoveredNode.id === m.id;
    var isSearchHit = searchHighlight.has(m.id);
    var isOnPath = hlSet[m.id] || false;

    var nodeDelay = (mi / memories.length) * 0.3;
    var nodeEntry = Math.min(1, easeOutExpo(Math.max(0, phaseNodes * 1.5 - nodeDelay)));
    var nodeScale = 0.3 + nodeEntry * 0.7;

    var alpha = nodeEntry;
    if (selectedNode && !isSelected && !isOnPath) alpha *= (1 - dimEased * 0.88);
    if (m.is_forgotten) alpha *= 0.25;
    if (alpha < 0.01) { ns.glow.visible = false; ns.orb.visible = false; ns.corona.visible = false; continue; }

    // Compound breathing
    var pulse = 1
      + Math.sin(time * 1.1 + m.id * 0.7) * 0.06
      + Math.sin(time * 2.7 + m.id * 1.3) * 0.03
      + Math.sin(time * 4.3 + m.id * 2.1) * 0.015;
    var pr = r * nodeScale * pulse;

    // Glow
    var glowBreath = 1 + Math.sin(time * 0.7 + m.id * 1.1) * 0.18 + Math.sin(time * 2.1 + m.id * 0.5) * 0.08;
    var bloomMult = (isSelected || isHovered || isSearchHit) ? 10 : 8;
    var glowDiam = pr * bloomMult * 2;
    ns.glow.position.set(ap.x, ap.y);
    ns.glow.scale.set(glowDiam / 128);
    ns.glow.alpha = alpha * (isSelected || isHovered ? 0.8 : 0.6) * glowBreath;
    ns.glow.visible = true;

    // Orb with rotation
    var orbDiam = pr * 2;
    ns.orb.position.set(ap.x, ap.y);
    ns.orb.scale.set(orbDiam / 128);
    ns.orb.alpha = alpha;
    ns.orb.rotation = time * (0.12 + (m.id % 17) * 0.008) * (m.id % 2 === 0 ? 1 : -1);
    ns.orb.visible = true;

    // Corona ring
    ns.corona.position.set(ap.x, ap.y);
    ns.corona.rotation = time * (0.15 + (m.id % 13) * 0.01) * (m.id % 3 === 0 ? -1 : 1);
    var coronaScale = pr * 3.5 / 64;
    ns.corona.scale.set(coronaScale);
    var coronaAlpha = alpha * (0.08 + ((m.importance || 1) / 10) * 0.28);
    ns.corona.alpha = coronaAlpha;
    ns.corona.visible = coronaAlpha > 0.01 && transform.k > 0.2;
  }
}

// Overlay — uses animated positions
function updateOverlay() {
  overlayGfx.clear();

  if (transform.k > 1.5) {
    var now = Date.now();
    var oneDayAgo = now - 86400000;
    for (var mi = 0; mi < memories.length; mi++) {
      var m = memories[mi];
      if (!nodeVisible(m)) continue;
      var ap = nodeAnimPos[m.id];
      if (!ap) continue;
      var r = nodeRadius(m);
      var col = COLORS[m.category] || COLORS.general;

      if (m.is_forgotten) {
        var cs = r * 0.5;
        overlayGfx.lineStyle(1.5 / transform.k, 0xef4444, 0.6);
        overlayGfx.moveTo(ap.x - cs, ap.y - cs); overlayGfx.lineTo(ap.x + cs, ap.y + cs);
        overlayGfx.moveTo(ap.x + cs, ap.y - cs); overlayGfx.lineTo(ap.x - cs, ap.y + cs);
      }

      var createdAt = m.created_at ? new Date(m.created_at).getTime() : 0;
      if (createdAt > oneDayAgo) {
        overlayGfx.lineStyle(0); overlayGfx.beginFill(0x22c55e, 0.8);
        overlayGfx.drawCircle(ap.x + r * 0.7, ap.y - r * 0.7, 2.5 / transform.k);
        overlayGfx.endFill();
      }

      if (m.forget_after) {
        var expiresAt = new Date(m.forget_after).getTime();
        var hoursLeft = (expiresAt - now) / 3600000;
        if (hoursLeft > 0 && hoursLeft < 48) {
          overlayGfx.lineStyle(1 / transform.k, 0xfbbf24, 0.4 + Math.sin(time * 2) * 0.15);
          overlayGfx.drawCircle(ap.x, ap.y, r + 2 / transform.k);
        }
      }

      if (m.is_static) {
        overlayGfx.lineStyle(0.8 / transform.k, col.hex, 0.2);
        overlayGfx.drawCircle(ap.x, ap.y, r + 4 / transform.k);
      }
    }
  }

  // Selected ring
  if (selectedNode) {
    var ap = nodeAnimPos[selectedNode.id];
    if (ap) {
      var r = nodeRadius(selectedNode);
      var pulse = 1 + Math.sin(time * 1.1 + selectedNode.id * 0.7) * 0.06;
      var pr = r * pulse;
      var selPulse = Math.sin(time * 3) * 0.5 + 0.5;
      var selR = pr + (5 + selPulse * 3) / transform.k;
      var col = COLORS[selectedNode.category] || COLORS.general;
      overlayGfx.lineStyle(3 / transform.k, col.hex, 0.1 + selPulse * 0.08);
      overlayGfx.drawCircle(ap.x, ap.y, selR + 2 / transform.k);
      overlayGfx.lineStyle(1.2 / transform.k, col.hex, 0.3 + selPulse * 0.25);
      overlayGfx.drawCircle(ap.x, ap.y, selR);
    }
  }

  // Hover ring
  if (hoveredNode && (!selectedNode || hoveredNode.id !== selectedNode.id)) {
    var ap = nodeAnimPos[hoveredNode.id];
    if (ap) {
      var r = nodeRadius(hoveredNode);
      var col = COLORS[hoveredNode.category] || COLORS.general;
      overlayGfx.lineStyle(0.8 / transform.k, col.hex, 0.35);
      overlayGfx.drawCircle(ap.x, ap.y, r + 4 / transform.k);
    }
  }
}

// ===== Main Ticker =====
app.ticker.add(function() {
  time = performance.now() * 0.001;
  var dt = app.ticker.deltaMS / 1000;

  // Entry animation
  if (entryProgress < 1 && loadTime > 0) {
    entryProgress = Math.min(1, (performance.now() - loadTime) / 2500);
  }

  // Dim animation
  dimTarget = selectedNode ? 1 : 0;
  if (dimProgress < dimTarget) dimProgress = Math.min(dimTarget, dimProgress + dt / 1.5);
  else if (dimProgress > dimTarget) dimProgress = Math.max(dimTarget, dimProgress - dt / 0.5);
  var dimEased = easeOutCubic(dimProgress);

  // Entry phases
  var phaseCenter = clamp01(entryProgress / 0.15);
  var phaseTrunk = clamp01((entryProgress - 0.12) / 0.23);
  var phaseNuclei = clamp01((entryProgress - 0.3) / 0.2);
  var phaseBranch = clamp01((entryProgress - 0.45) / 0.3);
  var phaseNodes = clamp01((entryProgress - 0.6) / 0.4);
  var entryEased = easeOutExpo(entryProgress);

  // Compute animated positions for this frame
  computeAnimatedPositions();

  // Screen-space effects
  updateStars();
  updateNebulaDrifts(dt);
  updateDust(dt);
  updateShootingStars(dt);

  // World-space effects
  updateGrid();
  updateCurves(phaseTrunk, phaseBranch, dimEased);
  updateParticles(entryEased, dimEased);
  updateEnergyPulses(dt, entryEased, dimEased);
  updatePulseRings(entryEased, dimEased);
  updateOrbitParticles(dt, entryEased, dimEased);
  updateNodeSparks(dt, entryEased, dimEased);
  updateHub(phaseCenter);
  updateNuclei(phaseNuclei, dimEased);
  updateNodes(phaseNodes, dimEased);
  updateOverlay();
});

// ===== Interaction — uses animated positions =====
function screenToWorld(sx, sy) {
  return [(sx - transform.x) / transform.k, (sy - transform.y) / transform.k];
}

function findNode(sx, sy) {
  var wxy = screenToWorld(sx, sy), wx = wxy[0], wy = wxy[1];
  var closest = null, closestDist = Infinity;
  for (var i = 0; i < memories.length; i++) {
    var m = memories[i];
    if (!nodeVisible(m)) continue;
    var ap = nodeAnimPos[m.id];
    if (!ap) continue;
    var dx = ap.x - wx, dy = ap.y - wy;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var hitR = nodeRadius(m) + 8 / transform.k;
    if (dist < hitR && dist < closestDist) { closest = m; closestDist = dist; }
  }
  return closest;
}

function findNucleus(sx, sy) {
  var wxy = screenToWorld(sx, sy), wx = wxy[0], wy = wxy[1];
  var cats = Object.keys(nuclei);
  for (var i = 0; i < cats.length; i++) {
    var nap = nucleiAnimPos[cats[i]];
    if (!nap) continue;
    var dx = nap.x - wx, dy = nap.y - wy;
    if (Math.sqrt(dx * dx + dy * dy) < NUCLEUS_ORB_R + 6 / transform.k) return cats[i];
  }
  return null;
}

function hitCenterHub(sx, sy) {
  var wxy = screenToWorld(sx, sy);
  var dx = centerAnimPos.x - wxy[0], dy = centerAnimPos.y - wxy[1];
  return Math.sqrt(dx * dx + dy * dy) < CENTER_HUB_R + 8 / transform.k;
}

var tooltip = document.getElementById('tooltip');
function showTooltip(m, x, y) {
  tooltip.querySelector('.tt-id').textContent = '#' + m.id;
  tooltip.querySelector('.tt-cat').textContent = m.category;
  tooltip.querySelector('.tt-cat').style.color = nodeCol(m).core;

  var tx = x + 16, ty = y - 16;

  if (ty < 0) ty = 16;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';

}
function hideTooltip() { tooltip.style.opacity = '0'; }

// ===== Mouse Events =====
app.view.addEventListener('mousemove', function(e) {
  var node = findNode(e.clientX, e.clientY);
  if (node !== hoveredNode) {
    hoveredNode = node;
    var nucHit = !node ? findNucleus(e.clientX, e.clientY) : null;
    var hubHit = !node && !nucHit ? hitCenterHub(e.clientX, e.clientY) : false;
    app.view.style.cursor = (node || nucHit || hubHit) ? 'pointer' : 'default';
    if (node) showTooltip(node, e.clientX, e.clientY); else hideTooltip();
  } else if (node) {
    showTooltip(node, e.clientX, e.clientY);
  }
});

app.view.addEventListener('click', function(e) {
  var node = findNode(e.clientX, e.clientY);
  if (node) { openSidebar(node); return; }
  var nucHit = findNucleus(e.clientX, e.clientY);
  if (nucHit) { currentFilter = currentFilter === nucHit ? 'all' : nucHit; return; }
  if (hitCenterHub(e.clientX, e.clientY)) { currentFilter = 'all'; closeSidebar(); return; }
});

function navigateTo(id) {

// ===== Search =====
async function doSearch() {
  var q = document.getElementById('search').value.trim();
  if (!q) { searchHighlight.clear(); return; }
  try {
    var res = await fetch(BASE + '/search', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query: q, limit: 20 }) });
    var data = await res.json();
    searchHighlight = new Set((data.results || []).map(function(r) { return r.id; }));
    if (data.results && data.results.length > 0) {
      var first = nodeMap[data.results[0].id];
      if (first) { openSidebar(first); navigateTo(first.id); }
    }
  } catch(e) { console.error('Search failed:', e); }
}

// ===== Utility =====
function escHtml(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }
function formatDate(s) {
  if (!s) return '\u2014';
  try { return new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
  catch(e) { return s; }
}
function shortDate(s) {
  if (!s) return '\u2014';
  try { return new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
  catch(e) { return s; }
}
function memoryTitle(m) {
  var text = (m.content || '').trim();
  var firstLine = text.split('\n')[0].replace(/^#+\s*/, '').replace(/^\[.*?\]\s*/, '');
  if (firstLine.length > 80) firstLine = firstLine.slice(0, 77) + '...';
  return firstLine || 'Memory #' + m.id;
}
function memoryPreview(m) {
  var lines = (m.content || '').trim().split('\n');
  var preview = lines.slice(1).join(' ').replace(/\s+/g, ' ').trim();
  if (!preview && lines[0]) preview = lines[0].replace(/^#+\s*/, '');
  if (preview.length > 140) preview = preview.slice(0, 137) + '...';
  return preview;
}

var listPanelOpen = false;
var listFilter = 'all';
var listSort = 'newest';
var listSearchQuery = '';
var listSearchResults = null; // null = no search active
var listSearchDebounce = null;

function toggleListPanel() {
  listPanelOpen = !listPanelOpen;

  document.getElementById('viewport-controls').classList.toggle('shifted', listPanelOpen);

function buildListFilters() {
  var container = document.getElementById('lp-filters');
  var cats = ['all', 'task', 'discovery', 'decision', 'state', 'issue'];
  var counts = {};
  memories.forEach(function(m) { counts[m.category] = (counts[m.category] || 0) + 1; });
  var html = '';
  cats.forEach(function(cat) {
    var isAll = cat === 'all';
    var col = COLORS[cat] || COLORS.general;
    var active = listFilter === cat ? ' active' : '';
    var count = isAll ? memories.length : (counts[cat] || 0);
    var style = '';
    if (!isAll) {
      style = ' style="--chip-color:' + col.core + ';--chip-bg:rgba(' + col.r + ',' + col.g + ',' + col.b + ',0.12);--chip-glow:rgba(' + col.r + ',' + col.g + ',' + col.b + ',0.1)"';
    }
    html += '<button class="lp-chip' + active + '"' + style + ' onclick="setListFilter(\'' + cat + '\')">';
    if (!isAll) html += '<span class="lp-chip-dot" style="background:' + col.core + ';box-shadow:0 0 6px ' + col.glow + '"></span>';
    html += (isAll ? 'All' : cat);
    html += '<span class="lp-chip-count">' + count + '</span>';
    html += '</button>';
  });
  container.innerHTML = html;
}

function setListFilter(cat) {
  listFilter = cat;
  buildListFilters();
  renderListItems();
}

function setListSort(sort) {
  listSort = sort;
  document.querySelectorAll('.lp-sort-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.sort === sort);
  });
  renderListItems();
}

function getFilteredMemories() {
  var source;
  if (listSearchResults) {
    source = listSearchResults.map(function(r) { return nodeMap[r.id]; }).filter(Boolean);
  } else {
    source = memories.slice();
  }
  if (listFilter !== 'all') {
    source = source.filter(function(m) { return m.category === listFilter; });
  }
  if (listSearchQuery && !listSearchResults) {
    var q = listSearchQuery.toLowerCase();
    source = source.filter(function(m) {
      return (m.content || '').toLowerCase().indexOf(q) !== -1 ||
             (m.category || '').toLowerCase().indexOf(q) !== -1 ||
             String(m.id).indexOf(q) !== -1;
    });
  }
  // Sort
  if (listSort === 'newest') {
    source.sort(function(a, b) { return (b.created_at || '').localeCompare(a.created_at || ''); });
  } else if (listSort === 'oldest') {
    source.sort(function(a, b) { return (a.created_at || '').localeCompare(b.created_at || ''); });
  } else if (listSort === 'importance') {
    source.sort(function(a, b) { return (b.importance || 0) - (a.importance || 0); });
  } else if (listSort === 'id') {
    source.sort(function(a, b) { return b.id - a.id; });
  }
  return source;
}

function renderListItems() {
  var container = document.getElementById('lp-list');
  var filtered = getFilteredMemories();
  document.getElementById('lp-count').textContent = filtered.length + ' item' + (filtered.length !== 1 ? 's' : '');

      '<div class="lp-empty-text">No memories found</div>' +
      '<div class="lp-empty-sub">' + (listSearchQuery ? 'Try a different search term' : 'Adjust your filters') + '</div></div>';

  }

  var html = '';
  if (listSearchResults) {
    html += '<div class="lp-search-status">' +
      '<span>' + listSearchResults.length + ' search results</span>' +
      '<a class="lp-search-clear-results" onclick="clearListSearch()">Clear search</a></div>';
  }

  for (var i = 0; i < filtered.length; i++) {

    var col = COLORS[m.category] || COLORS.general;
    var active = selectedNode && selectedNode.id === m.id ? ' active-card' : '';
    var delay = Math.min(i * 0.02, 0.5);

    if (m.is_forgotten) badges += '<span class="badge badge-forgotten">FORGOT</span>';
    if ((m.version || 1) > 1) badges += '<span class="badge" style="background:rgba(129,140,248,0.1);color:#818cf8;border:1px solid rgba(129,140,248,0.15)">v' + m.version + '</span>';

    // Category icon
    var typeIcon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="' + col.core + '" stroke-width="2" stroke-linecap="round">';
    if (m.category === 'task') typeIcon += '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>';
    else if (m.category === 'discovery') typeIcon += '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>';
    else if (m.category === 'decision') typeIcon += '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>';
    else if (m.category === 'state') typeIcon += '<rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>';
    else if (m.category === 'issue') typeIcon += '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>';
    else typeIcon += '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>';

  }

function renderListPanel() {
  buildListFilters();

}

  var m = nodeMap[id];

function updateListPanelActive(activeId) {
  if (!listPanelOpen) return;

  });

    activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

// List panel search — hybrid: instant client-side + debounced API search
var lpSearchInput = document.getElementById('lp-search-input');
var lpSearchClear = document.getElementById('lp-search-clear');

lpSearchInput.addEventListener('input', function() {
  listSearchQuery = this.value.trim();
  lpSearchClear.classList.toggle('visible', listSearchQuery.length > 0);
  listSearchResults = null; // Reset API results, use client-side filter
  renderListItems();
  // Debounced API search for semantic results
  if (listSearchDebounce) clearTimeout(listSearchDebounce);
  if (listSearchQuery.length >= 3) {
    listSearchDebounce = setTimeout(function() {
      doListApiSearch(listSearchQuery);
    }, 400);
  }
});

lpSearchInput.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { clearListSearch(); e.stopPropagation(); }
});

async function doListApiSearch(q) {
  try {
    var res = await fetch(BASE + '/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q, limit: 50 })
    });
    var data = await res.json();
    if (listSearchQuery === q && data.results) {
      listSearchResults = data.results;
      searchHighlight = new Set(data.results.map(function(r) { return r.id; }));
      renderListItems();
    }
  } catch(e) { /* silent */ }
}

function clearListSearch() {
  listSearchQuery = '';
  listSearchResults = null;
  searchHighlight.clear();
  lpSearchInput.value = '';
  lpSearchClear.classList.remove('visible');
  renderListItems();
}

// ===== Next / Prev Memory Navigation =====
function getVisibleMemoryList() {
  if (listPanelOpen) return getFilteredMemories();
  return memories.slice().sort(function(a, b) { return a.id - b.id; });
}

function navNextMemory() {
  if (!selectedNode) return;
  var list = getVisibleMemoryList();
  var idx = -1;
  for (var i = 0; i < list.length; i++) { if (list[i].id === selectedNode.id) { idx = i; break; } }
  if (idx >= 0 && idx < list.length - 1) {
    var next = list[idx + 1];
    openSidebar(next);
    navigateTo(next.id);
  }
}

function navPrevMemory() {
  if (!selectedNode) return;
  var list = getVisibleMemoryList();
  var idx = -1;
  for (var i = 0; i < list.length; i++) { if (list[i].id === selectedNode.id) { idx = i; break; } }
  if (idx > 0) {
    var prev = list[idx - 1];
    openSidebar(prev);
    navigateTo(prev.id);
  }
}

// ===== Legend =====
var legendOpen = false;
function toggleLegend() {
  legendOpen = !legendOpen;
  document.querySelector('.legend-toggle').classList.toggle('open', legendOpen);
  document.getElementById('legend-body').classList.toggle('open', legendOpen);
}

function buildLegend() {
  var body = document.getElementById('legend-body');
  var cats = ['task', 'discovery', 'decision', 'state', 'issue'];
  var counts = {};
  memories.forEach(function(m) { counts[m.category] = (counts[m.category] || 0) + 1; });
  var html = '';
  cats.forEach(function(cat) {
    var col = COLORS[cat];
    html += '<div class="legend-row">';
    html += '<div class="legend-dot" style="background:' + col.core + ';--dot-glow:' + col.glow + '"></div>';
    html += '<span class="legend-label">' + cat + '</span>';
    html += '<span class="legend-count">' + (counts[cat] || 0) + '</span>';
    html += '</div>';
  });
  html += '<div class="legend-row" style="margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.04)">';
  html += '<div class="legend-dot" style="background:#b28dff;--dot-glow:#9060ff;width:10px;height:10px"></div>';
  html += '<span class="legend-label" style="color:#666">Hub (center)</span>';
  html += '</div>';
  body.innerHTML = html;
}

// ===== Viewport Controls =====
function fitView() {
  if (memories.length === 0) return;
  var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  memories.forEach(function(m) {
    var p = nodeAnimPos[m.id] || nodePositions[m.id];
    if (p) {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }
  });
  var padding = 80;
  var dx = maxX - minX + padding * 2;
  var dy = maxY - minY + padding * 2;
  var cx = (minX + maxX) / 2;
  var cy = (minY + maxY) / 2;
  var scale = Math.min(screenW / dx, screenH / dy, 2);
  scale = Math.max(scale, 0.1);
  var tx = screenW / 2 - cx * scale;
  var ty = screenH / 2 - cy * scale;
  d3.select(app.view).transition().duration(800).ease(d3.easeCubicInOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function centerView() {
  var cx = centerAnimPos.x || 0;
  var cy = centerAnimPos.y || 0;
  var tx = screenW / 2 - cx * transform.k;
  var ty = screenH / 2 - cy * transform.k;
  d3.select(app.view).transition().duration(600).ease(d3.easeCubicInOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(transform.k));
}

function zoomStep(dir) {
  var factor = dir > 0 ? 1.3 : 1 / 1.3;
  var newK = Math.max(0.05, Math.min(transform.k * factor, 8));
  var cx = screenW / 2, cy = screenH / 2;
  var tx = cx - (cx - transform.x) * (newK / transform.k);
  var ty = cy - (cy - transform.y) * (newK / transform.k);
  d3.select(app.view).transition().duration(300).ease(d3.easeCubicOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(newK));
}

function updateZoomLevel() {
  var pct = Math.round(transform.k * 100);
  var el = document.getElementById('zoom-level');
  if (el) el.textContent = pct + '%';
}

// ===== GUI CRUD =====
function openCreateDialog() {
  document.getElementById('modal-title').textContent = 'Create Memory';
  document.getElementById('modal-edit-id').value = '';
  document.getElementById('modal-cat').value = 'task';
  document.getElementById('modal-content').value = '';
  document.getElementById('modal-imp').value = '5';
  document.getElementById('modal-static').checked = false;
  document.getElementById('mem-modal').style.display = 'flex';
  setTimeout(function() { document.getElementById('modal-content').focus(); }, 100);
}

function editMemory(id) {
  var m = nodeMap[id];
  if (!m) return;
  document.getElementById('modal-title').textContent = 'Edit Memory #' + id;
  document.getElementById('modal-edit-id').value = String(id);
  document.getElementById('modal-cat').value = m.category || 'task';
  document.getElementById('modal-content').value = m.content || '';
  document.getElementById('modal-imp').value = String(m.importance || 5);
  document.getElementById('modal-static').checked = !!m.is_static;
  document.getElementById('mem-modal').style.display = 'flex';
  setTimeout(function() { document.getElementById('modal-content').focus(); }, 100);
}

function closeModal() {
  document.getElementById('mem-modal').style.display = 'none';
}

async function saveModal() {
  var editId = document.getElementById('modal-edit-id').value;
  var content = document.getElementById('modal-content').value.trim();
  if (!content) return;
  var payload = {
    content: content,
    category: document.getElementById('modal-cat').value,
    importance: Number(document.getElementById('modal-imp').value) || 5,
    is_static: document.getElementById('modal-static').checked,
  };
  try {
    var url, method;
    if (editId) {
      url = BASE + '/gui/memories/' + editId;
      method = 'PATCH';
    } else {
      url = BASE + '/gui/memories';
      method = 'POST';
    }
    var res = await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    var data = await res.json();
    if (data.created || data.updated) {
      closeModal();
      refreshData();
    } else {
      alert('Error: ' + (data.error || 'Unknown error'));
    }
  } catch(e) { alert('Save failed: ' + e.message); }
}

async function archiveMemory(id) {
  if (!confirm('Archive memory #' + id + '?')) return;
  try {
    await fetch(BASE + '/memory/' + id + '/archive', { method: 'POST' });
    closeSidebar();
    refreshData();
  } catch(e) { alert('Archive failed: ' + e.message); }
}

async function deleteMemoryConfirm(id) {
  if (!confirm('Permanently delete memory #' + id + '? This cannot be undone.')) return;
  try {
    await fetch(BASE + '/gui/memories/' + id, { method: 'DELETE' });
    closeSidebar();
    refreshData();
  } catch(e) { alert('Delete failed: ' + e.message); }
}

// ===== Data Loading =====
async function loadData() {
  try {
    var gRes = await fetch(BASE + '/graph');
    var gData = await gRes.json();
    memories = gData.memories || [];
    links = (gData.links || []).map(function(l) {
      return { source: l.source_id, target: l.target_id, similarity: l.similarity, type: l.type || 'similarity' };
    });
    nodeMap = {};
    memories.forEach(function(m) { nodeMap[m.id] = m; });
    lastMemoryCount = memories.length;
    lastMaxId = memories.reduce(function(mx, m) { return m.id > mx ? m.id : mx; }, 0);
    document.getElementById('stat-nodes').textContent = memories.length;
    document.getElementById('stat-links').textContent = links.length;
    document.getElementById('loading').style.display = 'none';
    computeLayout();
    computeAnimatedPositions();
    buildScene();
    loadTime = performance.now();
    entryProgress = 0;
    // Build UI elements
    buildLegend();
    if (listPanelOpen) renderListPanel();
    updateZoomLevel();
    scheduleRefresh();
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div class="text" style="color:#f87171">Failed: ' + e.message + '</div>';
  }
}

function scheduleRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(refreshData, REFRESH_INTERVAL);
}

async function refreshData() {
  try {
    var gRes = await fetch(BASE + '/graph');
    var gData = await gRes.json();
    var newMems = gData.memories || [];
    var newLinks = (gData.links || []).map(function(l) {
      return { source: l.source_id, target: l.target_id, similarity: l.similarity, type: l.type || 'similarity' };
    });
    var newMaxId = newMems.reduce(function(mx, m) { return m.id > mx ? m.id : mx; }, 0);

    if (newMems.length !== lastMemoryCount || newMaxId !== lastMaxId) {
      memories = newMems;
      links = newLinks;
      nodeMap = {};
      memories.forEach(function(m) { nodeMap[m.id] = m; });
      lastMemoryCount = memories.length;
      lastMaxId = newMaxId;
      document.getElementById('stat-nodes').textContent = memories.length;
      document.getElementById('stat-links').textContent = links.length;
      computeLayout();
      computeAnimatedPositions();
      buildScene();
      entryProgress = 1;
      buildLegend();
      if (listPanelOpen) renderListPanel();
      if (selectedNode) {
        var updated = nodeMap[selectedNode.id];
        if (updated) openSidebar(updated); else closeSidebar();
      }
    }
  } catch(e) { /* silent retry */ }
  scheduleRefresh();
}

// ===== Keyboard =====
document.getElementById('search').addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch(); });
document.addEventListener('keydown', function(e) {
  // Don't capture when typing in inputs
  var tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') {
    if (e.key === 'Escape') {
      e.target.blur();
      closeSidebar();
    }
    return;
  }
  if (e.key === 'Escape') { closeModal(); closeSidebar(); }
  if (e.key === 'l' || e.key === 'L') toggleListPanel();
  if (e.key === 'n' || e.key === 'N') openCreateDialog();
  if (e.key === 'z' || e.key === 'Z') fitView();
  if (e.key === 'c' && !e.ctrlKey && !e.metaKey) centerView();
  if (e.key === '=' || e.key === '+') zoomStep(1);
  if (e.key === '-') zoomStep(-1);
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navNextMemory(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); navPrevMemory(); }
});

// ===== Resize =====
window.addEventListener('resize', function() {
  screenW = window.innerWidth;
  screenH = window.innerHeight;
  app.renderer.resize(screenW, screenH);
  buildBackground();
  buildSky();
  if (memories.length > 0) {
    computeLayout();
    computeAnimatedPositions();
    buildScene();
  }
});

// ===== Init =====
buildBackground();
buildSky();
loadData();
</script>
