<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Engram</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.2/dist/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-filters@4.2.0/dist/pixi-filters.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #070a0f; color: #c8ccd4; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
  canvas { position: fixed; top: 0; left: 0; display: block; }

  .glass {
    background: rgba(15, 20, 25, 0.55);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; gap: 16px; padding: 10px 20px;
    background: rgba(15,20,25,0.75);
    backdrop-filter: blur(30px) saturate(1.5);
    -webkit-backdrop-filter: blur(30px) saturate(1.5);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
  }
  #topbar h1 {
    font-size: 15px; font-weight: 700; color: #e2e4e9;
    letter-spacing: 1.5px; white-space: nowrap; text-transform: uppercase;
  }
  #topbar h1 span {
    background: linear-gradient(135deg, #7b8fff 0%, #b28dff 50%, #c084fc 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-glow { display: inline-block; filter: drop-shadow(0 0 8px rgba(129,140,248,0.3)); }
  #search-box { flex: 1; max-width: 380px; position: relative; }
  #search-box input {
    width: 100%; padding: 8px 14px 8px 34px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; color: #e2e4e9; font-size: 12px;
    font-family: 'Inter', sans-serif; outline: none;
    transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  #search-box input:focus {
    border-color: rgba(129,140,248,0.5);
    background: rgba(255,255,255,0.07);
    box-shadow: 0 0 24px rgba(129,140,248,0.12), 0 0 60px rgba(129,140,248,0.04);
  }
  #search-box input::placeholder { color: #3a3a50; }
  #search-box svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: 0.3; }
  .stats {
    display: flex; gap: 14px; margin-left: auto;
    font-size: 11px; color: #3a3a50;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px;
  }
  .stats .val {
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-weight: 500;
  }

  #sidebar {
    position: fixed; top: 0; right: -460px; width: 460px; height: 100vh; z-index: 20;
    background: rgba(15,20,25,0.92);
    backdrop-filter: blur(32px) saturate(1.6);
    -webkit-backdrop-filter: blur(32px) saturate(1.6);
    border-left: 1px solid rgba(255,255,255,0.05);
    box-shadow: -12px 0 60px rgba(0,0,0,0.5), inset 1px 0 0 rgba(255,255,255,0.03);
    transition: right 0.5s cubic-bezier(0.16,1,0.3,1);
    overflow-y: auto; padding: 28px;
  }
  #sidebar.open { right: 0; }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
  .close-btn {
    position: absolute; top: 16px; right: 16px; width: 30px; height: 30px;
    border-radius: 10px; border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03); color: #555; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .close-btn:hover { background: rgba(255,255,255,0.08); color: #aaa; transform: rotate(90deg); }
  .mem-header { margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .mem-id {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px; letter-spacing: 0.5px;
  }
  .mem-category {
    display: inline-block; padding: 3px 10px; border-radius: 6px;
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
  }
  .mem-content {
    font-size: 12.5px; line-height: 1.8; color: #a0a4b0;
    margin: 16px 0; white-space: pre-wrap; word-break: break-word;
  }
  .mem-meta {
    display: grid; grid-template-columns: auto 1fr;
    gap: 6px 16px; font-size: 11px; margin-top: 16px;
    padding: 14px; border-radius: 10px;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03);
  }
  .mem-meta .label { color: #3a3a50; font-family: 'JetBrains Mono', monospace; font-size: 10px; }
  .mem-meta .value { color: #777; }
  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 9px; font-weight: 600; margin-left: 6px; letter-spacing: 0.5px;
  }
  .badge-static { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.1); }
  .badge-forgotten { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.1); }
  .badge-inference { background: rgba(168,85,247,0.1); color: #c084fc; border: 1px solid rgba(168,85,247,0.1); }
  .linked-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.04); }
  .linked-section h3 {
    font-size: 10px; color: #3a3a50; margin-bottom: 12px;
    font-weight: 500; text-transform: uppercase; letter-spacing: 1px;
  }
  .linked-item {
    padding: 10px 12px; margin-bottom: 4px; border-radius: 10px;
    background: rgba(255,255,255,0.02); cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1); border: 1px solid transparent;
  }
  .linked-item:hover {
    background: rgba(129,140,248,0.05); border-color: rgba(129,140,248,0.1);
    transform: translateX(2px);
  }
  .linked-item .link-type {
    font-size: 9px; font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .linked-item .link-preview { font-size: 11px; color: #555; margin-top: 4px; line-height: 1.5; }

  #tooltip {
    position: fixed; z-index: 30; pointer-events: none;
    background: rgba(15,20,25,0.92); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 12px 16px; max-width: 320px;
    opacity: 0; transition: opacity 0.25s;
    backdrop-filter: blur(16px) saturate(1.4);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(129,140,248,0.04);
  }
  #tooltip .tt-id { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #818cf8; }
  #tooltip .tt-cat { font-size: 9px; text-transform: uppercase; margin-left: 6px; font-weight: 600; letter-spacing: 0.5px; }
  #tooltip .tt-text { font-size: 11px; color: #777; margin-top: 6px; line-height: 1.55; }

  #loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 50;
    text-align: center;
  }
  .spinner {
    width: 32px; height: 32px; border: 2px solid rgba(129,140,248,0.1);
    border-top-color: #818cf8; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    box-shadow: 0 0 20px rgba(129,140,248,0.15);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .text { font-size: 12px; color: #3a3a50; letter-spacing: 0.5px; }

  /* ===== List Panel (Left) ===== */
  #list-toggle {
    width: 34px; height: 34px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.04); color: #666; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1); flex-shrink: 0;
  }
  #list-toggle:hover { background: rgba(129,140,248,0.12); color: #818cf8; border-color: rgba(129,140,248,0.2); }
  #list-toggle.active { background: rgba(129,140,248,0.15); color: #818cf8; border-color: rgba(129,140,248,0.3); box-shadow: 0 0 16px rgba(129,140,248,0.1); }

  /* Inbox Panel */
  #inbox-panel {
    position: fixed; top: 56px; left: -460px; width: 440px; height: calc(100vh - 56px); z-index: 15;
    background: rgba(15,20,25,0.92);
    backdrop-filter: blur(32px) saturate(1.6);
    -webkit-backdrop-filter: blur(32px) saturate(1.6);
    border-right: 1px solid rgba(255,255,255,0.05);
    box-shadow: 12px 0 60px rgba(0,0,0,0.4);
    transition: left 0.5s cubic-bezier(0.16,1,0.3,1);
    overflow-y: auto; display: flex; flex-direction: column;
  }
  #inbox-panel.open { left: 0; }
  #inbox-panel::-webkit-scrollbar { width: 4px; }
  #inbox-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
  .inbox-header {
    padding: 16px 18px 12px; border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
  }
  .inbox-title {
    display: flex; align-items: center; gap: 10px;
  }
  .inbox-title h2 {
    font-size: 13px; font-weight: 600; color: #e2e4e9;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .inbox-count {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #f97316;
    background: rgba(249,115,22,0.1); padding: 2px 8px; border-radius: 6px;
    border: 1px solid rgba(249,115,22,0.15);
  }
  .inbox-actions {
    display: flex; gap: 6px;
  }
  .inbox-action-btn {
    padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03); color: #94a3b8; font-size: 10px;
    font-family: 'Inter', sans-serif; cursor: pointer; font-weight: 500;
    transition: all 0.2s;
  }
  .inbox-action-btn:hover { background: rgba(255,255,255,0.06); color: #e2e4e9; }
  .inbox-action-btn.approve-all { border-color: rgba(52,211,153,0.2); color: #34d399; }
  .inbox-action-btn.approve-all:hover { background: rgba(52,211,153,0.1); }
  .inbox-action-btn.reject-all { border-color: rgba(248,113,113,0.2); color: #f87171; }
  .inbox-action-btn.reject-all:hover { background: rgba(248,113,113,0.1); }
  .inbox-list { flex: 1; overflow-y: auto; padding: 8px; }
  .inbox-card {
    padding: 14px 16px; margin-bottom: 6px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.04);
    background: rgba(255,255,255,0.015);
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
    position: relative;
  }
  .inbox-card:hover {
    background: rgba(255,255,255,0.035);
    border-color: rgba(255,255,255,0.08);
  }
  .inbox-card.selected {
    border-color: rgba(129,140,248,0.3);
    background: rgba(129,140,248,0.06);
  }
  .inbox-card-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .inbox-card-header input[type="checkbox"] {
    accent-color: #818cf8; width: 14px; height: 14px; cursor: pointer;
  }
  .inbox-card-meta {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #3a3a50; letter-spacing: 0.3px;
  }
  .inbox-card-cat {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    margin-left: 6px;
  }
  .inbox-card-content {
    font-size: 12px; line-height: 1.6; color: #c8ccd4;
    max-height: 120px; overflow: hidden; margin-bottom: 10px;
    word-wrap: break-word;
  }
  .inbox-card-content.expanded { max-height: none; }
  .inbox-card-actions {
    display: flex; gap: 6px; align-items: center;
  }
  .inbox-btn {
    padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
    border: 1px solid transparent;
  }
  .inbox-btn.approve {
    background: rgba(52,211,153,0.1); color: #34d399; border-color: rgba(52,211,153,0.2);
  }
  .inbox-btn.approve:hover { background: rgba(52,211,153,0.2); }
  .inbox-btn.edit {
    background: rgba(129,140,248,0.1); color: #818cf8; border-color: rgba(129,140,248,0.2);
  }
  .inbox-btn.edit:hover { background: rgba(129,140,248,0.2); }
  .inbox-btn.reject {
    background: rgba(248,113,113,0.08); color: #f87171; border-color: rgba(248,113,113,0.15);
  }
  .inbox-btn.reject:hover { background: rgba(248,113,113,0.15); }
  .inbox-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 300px; color: #3a3a50; text-align: center;
  }
  .inbox-empty svg { margin-bottom: 12px; opacity: 0.3; }
  .inbox-empty p { font-size: 13px; }
  .inbox-empty small { font-size: 11px; color: #2a2a3a; margin-top: 4px; }
  #inbox-toggle.active {
    background: rgba(249,115,22,0.15); color: #f97316; border-color: rgba(249,115,22,0.3);
    box-shadow: 0 0 16px rgba(249,115,22,0.1);
  }

  #list-panel {
    position: fixed; top: 0; left: -420px; width: 420px; height: 100vh; z-index: 15;
    background: rgba(8,11,18,0.96);
    backdrop-filter: blur(40px) saturate(1.6);
    -webkit-backdrop-filter: blur(40px) saturate(1.6);
    border-right: 1px solid rgba(129,140,248,0.08);
    box-shadow: 12px 0 60px rgba(0,0,0,0.6), inset -1px 0 0 rgba(255,255,255,0.02);
    transition: left 0.5s cubic-bezier(0.16,1,0.3,1);
    display: flex; flex-direction: column;
  }
  #list-panel.open { left: 0; }

  .lp-header { padding: 16px 16px 0; flex-shrink: 0; }
  .lp-title {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding-top: 50px;
  }
  .lp-title h2 {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .lp-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #3a3a50; }

  .lp-search { position: relative; margin-bottom: 12px; }
  .lp-search input {
    width: 100%; padding: 10px 38px 10px 36px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; color: #e2e4e9; font-size: 12px;
    font-family: 'Inter', sans-serif; outline: none;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .lp-search input:focus {
    border-color: rgba(129,140,248,0.5); background: rgba(255,255,255,0.06);
    box-shadow: 0 0 24px rgba(129,140,248,0.12);
  }
  .lp-search input::placeholder { color: #2a2a3a; }
  .lp-search .lp-search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.3; pointer-events: none;
  }
  .lp-search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    width: 20px; height: 20px; border-radius: 5px; border: none;
    background: rgba(255,255,255,0.06); color: #555; cursor: pointer;
    font-size: 12px; display: none; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .lp-search-clear.visible { display: flex; }
  .lp-search-clear:hover { background: rgba(255,255,255,0.12); color: #aaa; }

  .lp-filters { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .lp-chip {
    padding: 4px 10px; border-radius: 20px; font-size: 9px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); color: #444;
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1); user-select: none;
  }
  .lp-chip:hover { background: rgba(255,255,255,0.05); color: #777; }
  .lp-chip.active {
    border-color: var(--chip-color, rgba(129,140,248,0.4));
    background: var(--chip-bg, rgba(129,140,248,0.12));
    color: var(--chip-color, #818cf8);
    box-shadow: 0 0 14px var(--chip-glow, rgba(129,140,248,0.1));
  }
  .lp-chip .lp-chip-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    margin-right: 5px; vertical-align: middle;
  }
  .lp-chip .lp-chip-count {
    font-size: 8px; opacity: 0.5; margin-left: 4px;
  }

  .lp-sort-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
    padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .lp-sort-label { font-size: 9px; color: #2a2a3a; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .lp-sort-btn {
    padding: 3px 8px; border-radius: 5px; font-size: 9px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.02);
    color: #3a3a50; transition: all 0.2s; font-family: 'JetBrains Mono', monospace;
  }
  .lp-sort-btn:hover { color: #777; background: rgba(255,255,255,0.04); }
  .lp-sort-btn.active { color: #818cf8; border-color: rgba(129,140,248,0.3); background: rgba(129,140,248,0.06); }

  .lp-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
  .lp-list::-webkit-scrollbar { width: 3px; }
  .lp-list::-webkit-scrollbar-track { background: transparent; }
  .lp-list::-webkit-scrollbar-thumb { background: rgba(129,140,248,0.15); border-radius: 3px; }
  .lp-list::-webkit-scrollbar-thumb:hover { background: rgba(129,140,248,0.3); }

  /* Supermemory-style cards */
  .lp-card {
    padding: 14px 16px; margin-bottom: 8px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(15,20,30,0.8) 0%, rgba(20,25,40,0.6) 100%);
    border: 1px solid rgba(255,255,255,0.04);
    cursor: pointer; transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
    position: relative; overflow: hidden;
  }
  .lp-card::before {
    content: ''; position: absolute; inset: 0; border-radius: 12px;
    background: radial-gradient(ellipse at 50% 0%, var(--card-glow, rgba(129,140,248,0.06)) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.35s;
  }
  .lp-card::after {
    content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px;
    background: var(--card-accent, #818cf8); border-radius: 2px;
    opacity: 0; transition: opacity 0.3s;
  }
  .lp-card:hover {
    border-color: var(--card-border-hover, rgba(129,140,248,0.15));
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 20px var(--card-glow, rgba(129,140,248,0.04));
  }
  .lp-card:hover::before { opacity: 1; }
  .lp-card:hover::after { opacity: 0.8; }
  .lp-card.active-card {
    border-color: var(--card-accent, rgba(129,140,248,0.25));
    background: linear-gradient(135deg, rgba(20,25,40,0.9) 0%, rgba(25,30,50,0.7) 100%);
    box-shadow: 0 4px 24px var(--card-glow, rgba(129,140,248,0.08));
  }
  .lp-card.active-card::after { opacity: 1; }

  .lp-card-type {
    display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
  }
  .lp-card-type svg { opacity: 0.5; flex-shrink: 0; }
  .lp-card-type-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px;
    color: var(--card-accent, #818cf8);
  }
  .lp-card-id {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #333;
    margin-left: auto;
  }

  .lp-card-title {
    font-size: 12px; font-weight: 600; color: #d0d4dc; line-height: 1.4;
    margin-bottom: 6px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .lp-card-preview {
    font-size: 11px; color: #4a4e5c; line-height: 1.5;

// ===== Helpers =====
function clamp01(x) { return x < 0 ? 0 : x > 1 ? 1 : x; }
function easeOutExpo(x) { return x === 1 ? 1 : 1 - Math.pow(2, -10 * x); }
function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }
function nodeRadius(m) { return 1.8 + Math.sqrt(m.importance || 1) * 1.2 + (m.source_count > 1 ? Math.log2(m.source_count) * 0.6 : 0); }
function nodeCol(m) { return COLORS[m.category] || COLORS.general; }
function nodeVisible(m) {
  if (currentFilter !== 'all' && m.category !== currentFilter) return false;
  if (sourceFilter !== 'all' && (m.source || '') !== sourceFilter) return false;
  // Hide memories in collapsed clusters
  var mCluster = memToCluster[m.id];
  if (mCluster && clusters[mCluster] && !clusters[mCluster].expanded) return false;
  return true;
}
function bezierPt(x1, y1, cx, cy, x2, y2, t) {
  var u = 1 - t;
  return { x: u*u*x1 + 2*u*t*cx + t*t*x2, y: u*u*y1 + 2*u*t*cy + t*t*y2 };
}
function rng(a, b) { return a + Math.random() * (b - a); }

// Dynamic curve endpoint computation from animated positions
function getSegPts(seg) {
  var fp, tp;
  if (seg._isTrunk) {
    fp = centerAnimPos;
    tp = nucleiAnimPos[seg.cat] || centerAnimPos;
  } else {
    // Resolve fromId — could be null (nucleus), a cluster, or a memory node
    if (seg.fromId === null) {
      fp = nucleiAnimPos[seg.cat] || centerAnimPos;
    } else if (seg.fromCluster || (typeof seg.fromId === 'string' && seg.fromId[0] === 'c')) {
      fp = clusterAnimPos[seg.fromId] || centerAnimPos;
    } else {
      fp = nodeAnimPos[seg.fromId] || centerAnimPos;
    }
    // Resolve toId — could be a cluster or a memory node
    if (seg.isCluster || (typeof seg.toId === 'string' && seg.toId[0] === 'c')) {
      tp = clusterAnimPos[seg.toId] || centerAnimPos;
    } else {
      tp = nodeAnimPos[seg.toId] || centerAnimPos;
    }
  }
  var mx = (fp.x + tp.x) * 0.5, my = (fp.y + tp.y) * 0.5;
  var dx = tp.x - fp.x, dy = tp.y - fp.y;
  var len = Math.sqrt(dx * dx + dy * dy) || 1;
  return {
    x1: fp.x, y1: fp.y,
    cx: mx + (-dy / len) * seg._curveOff,
    cy: my + (dx / len) * seg._curveOff,
    x2: tp.x, y2: tp.y
  };
}

// Mini spiral galaxy — lives inside each memory orb
var innerGalaxyTex = mkTex(64, function(g, sz) {
  var cx = sz / 2, cy = sz / 2, r = sz / 2;
  g.clearRect(0, 0, sz, sz);

  // Tight spiral — 3 arms, concentrated toward center, rapid edge fade
  for (var arm = 0; arm < 3; arm++) {
    var offset = arm * (Math.PI * 2 / 3);
    for (var t = 0.2; t < 4.0; t += 0.08) {
      var spiralR = 1.5 + t * (r * 0.09);
      var a = t * 2.2 + offset;
      var x = cx + Math.cos(a) * spiralR;
      var y = cy + Math.sin(a) * spiralR;
      // Distance from center as 0-1
      var dNorm = spiralR / (r * 0.45);
      // Sharp radial fade — disappear well before edge
      var radFade = Math.max(0, 1 - dNorm * dNorm);
      var dotR = (0.3 + (1 - t / 4.0) * 0.9) * radFade;
      var br = ((1 - t / 4.0) * 0.6 + 0.05) * radFade;
      if (br < 0.01) continue;
      // Soft halo
      g.fillStyle = 'rgba(255,255,255,' + (br * 0.2) + ')';
      g.beginPath(); g.arc(x, y, dotR * 2, 0, Math.PI * 2); g.fill();
      // Bright dot
      g.fillStyle = 'rgba(255,255,255,' + br + ')';
      g.beginPath(); g.arc(x, y, dotR, 0, Math.PI * 2); g.fill();
    }
    // Scatter stars near arms — also radially faded
    var seed = arm * 137 + 42;
    for (var s = 0; s < 8; s++) {
      seed = (seed * 16807) % 2147483647;
      var st = 0.4 + (seed % 1000) / 1000 * 2.8;
      seed = (seed * 16807) % 2147483647;
      var sOff = ((seed % 1000) / 1000 - 0.5) * r * 0.12;
      var spiralR2 = 1.5 + st * (r * 0.09);
      var dN2 = spiralR2 / (r * 0.45);
      var rF2 = Math.max(0, 1 - dN2 * dN2);
      if (rF2 < 0.05) continue;
      var a2 = st * 2.2 + offset;
      var sx = cx + Math.cos(a2) * spiralR2 + Math.cos(a2 + 1.5) * sOff;
      var sy = cy + Math.sin(a2) * spiralR2 + Math.sin(a2 + 1.5) * sOff;
      var sBr = (0.1 + (seed % 100) / 100 * 0.2) * rF2;
      g.fillStyle = 'rgba(255,255,255,' + sBr + ')';
      g.beginPath(); g.arc(sx, sy, 0.3 + (seed % 50) / 50 * 0.4, 0, Math.PI * 2); g.fill();
    }
  }
  // Tiny bright nucleus
  var cGrad = g.createRadialGradient(cx, cy, 0, cx, cy, r * 0.12);
  cGrad.addColorStop(0, 'rgba(255,255,255,0.5)');
  cGrad.addColorStop(0.5, 'rgba(255,255,255,0.15)');

});

// Simple hash-based value noise for nebula generation
function _bgNoise(seed) {
  function hash(x, y) {
    var h = (x * 374761393 + y * 668265263 + seed * 1274126177) | 0;
    h = Math.imul(h ^ (h >>> 13), 1103515245);
    h = h ^ (h >>> 16);
    return (h & 0x7fffffff) / 0x7fffffff;
  }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function smooth(t) { return t * t * (3 - 2 * t); }
  return function(x, y) {
    var ix = Math.floor(x), iy = Math.floor(y);
    var fx = smooth(x - ix), fy = smooth(y - iy);
    var a = hash(ix, iy), b = hash(ix + 1, iy);
    var c = hash(ix, iy + 1), d = hash(ix + 1, iy + 1);
    return lerp(lerp(a, b, fx), lerp(c, d, fx), fy);
  };
}

function _bgFbm(noise, x, y, octaves) {
  var val = 0, amp = 0.5, freq = 1, max = 0;
  for (var i = 0; i < octaves; i++) {
    val += noise(x * freq, y * freq) * amp;
    max += amp;
    amp *= 0.5;
    freq *= 2.1;
  }
  return val / max;
}

function buildBackground() {
  var bw = Math.round(screenW * 0.5), bh = Math.round(screenH * 0.5);
  if (bw < 1 || bh < 1) return;
  var c = document.createElement('canvas');
  c.width = bw; c.height = bh;
  var g = c.getContext('2d');

  // ===== Rich gradient base (deep blue → indigo → purple edge) =====
  // Corner-to-corner linear for depth
  var bgLin = g.createLinearGradient(0, 0, bw, bh);
  bgLin.addColorStop(0, '#0a1628');
  bgLin.addColorStop(0.3, '#0d1832');
  bgLin.addColorStop(0.5, '#101535');
  bgLin.addColorStop(0.7, '#150e30');
  bgLin.addColorStop(1, '#1a0a2e');
  g.fillStyle = bgLin;
  g.fillRect(0, 0, bw, bh);

  // Radial center brightening
  var bgRad = g.createRadialGradient(bw * 0.45, bh * 0.45, 0, bw * 0.5, bh * 0.5, bw * 0.55);
  bgRad.addColorStop(0, 'rgba(18,28,55,0.6)');
  bgRad.addColorStop(0.5, 'rgba(12,18,40,0.3)');
  bgRad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = bgRad;
  g.fillRect(0, 0, bw, bh);

  // ===== Color regions (visible blue/purple/teal washes) =====
  g.globalCompositeOperation = 'lighter';
  var washes = [
    [0.30, 0.35, 0.45, 'rgba(25,40,100,0.08)'],
    [0.70, 0.60, 0.40, 'rgba(60,20,90,0.06)'],
    [0.15, 0.70, 0.35, 'rgba(15,50,80,0.05)'],
    [0.80, 0.20, 0.30, 'rgba(45,25,85,0.05)'],
    [0.50, 0.50, 0.55, 'rgba(20,30,70,0.04)'],
    [0.25, 0.15, 0.30, 'rgba(10,35,65,0.04)']
  ];
  for (var i = 0; i < washes.length; i++) {
    var w = washes[i];
    var wg = g.createRadialGradient(w[0]*bw, w[1]*bh, 0, w[0]*bw, w[1]*bh, w[2]*Math.max(bw,bh));
    wg.addColorStop(0, w[3]);
    wg.addColorStop(0.7, w[3].replace(/[\d.]+\)$/, '0.01)'));
    wg.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = wg;
    g.fillRect(0, 0, bw, bh);
  }

  // ===== Star field =====
  var seed = 42;
  function sr() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }

  // Layer 1: Dense micro-stars
  var microCount = Math.round(500 * (bw * bh) / (1920 * 1080));
  for (var i = 0; i < microCount; i++) {
    var sx = sr() * bw, sy = sr() * bh;
    var br = 0.03 + sr() * 0.10;
    var ss = 0.15 + sr() * 0.3;
    g.fillStyle = 'rgba(200,210,240,' + br + ')';
    g.beginPath(); g.arc(sx, sy, ss, 0, Math.PI * 2); g.fill();
  }

  // Layer 2: Star clusters
  var clusterCount = 5;
  for (var ci = 0; ci < clusterCount; ci++) {
    var clx = sr() * bw, cly = sr() * bh;
    var clRad = 20 + sr() * 40;
    var clStars = 25 + (sr() * 40) | 0;
    for (var si = 0; si < clStars; si++) {
      var ca = sr() * Math.PI * 2;
      var cd = sr() * sr() * clRad;
      var csx = clx + Math.cos(ca) * cd;
      var csy = cly + Math.sin(ca) * cd;
      var cbr = 0.06 + sr() * 0.20;
      var css = 0.2 + sr() * 0.45;
      var ct = sr();
      var cr, cg, cb;
      if (ct < 0.3) { cr = 180 + sr()*70|0; cg = 195 + sr()*55|0; cb = 240 + sr()*15|0; }
      else if (ct < 0.6) { cr = 235 + sr()*20|0; cg = 228 + sr()*27|0; cb = 200 + sr()*50|0; }
      else { cr = 215 + sr()*40|0; cg = 215 + sr()*40|0; cb = 220 + sr()*35|0; }
      g.fillStyle = 'rgba(' + cr + ',' + cg + ',' + cb + ',' + cbr + ')';
      g.beginPath(); g.arc(csx, csy, css, 0, Math.PI * 2); g.fill();
    }
  }

  // Layer 3: Medium stars with spectral colors
  var medCount = Math.round(250 * (bw * bh) / (1920 * 1080));
  for (var i = 0; i < medCount; i++) {
    var sx = sr() * bw, sy = sr() * bh;
    var isBright = sr() < 0.04;
    var br = isBright ? (0.35 + sr() * 0.5) : (0.05 + sr() * 0.18);
    var ss = isBright ? (0.5 + sr() * 1.4) : (0.2 + sr() * 0.5);
    var ct = sr();
    var cr, cg, cb;
    if (ct < 0.15) { cr = 155+sr()*50|0; cg = 175+sr()*50|0; cb = 240+sr()*15|0; }
    else if (ct < 0.30) { cr = 200+sr()*55|0; cg = 210+sr()*45|0; cb = 240+sr()*15|0; }
    else if (ct < 0.50) { cr = 240+sr()*15|0; cg = 230+sr()*25|0; cb = 195+sr()*40|0; }
    else if (ct < 0.65) { cr = 245+sr()*10|0; cg = 220+sr()*30|0; cb = 150+sr()*55|0; }
    else if (ct < 0.80) { cr = 240+sr()*15|0; cg = 180+sr()*40|0; cb = 120+sr()*50|0; }
    else { cr = 185+sr()*70|0; cg = 190+sr()*65|0; cb = 210+sr()*45|0; }
    g.fillStyle = 'rgba(' + cr + ',' + cg + ',' + cb + ',' + br + ')';
    g.beginPath(); g.arc(sx, sy, ss, 0, Math.PI * 2); g.fill();
    if (isBright) {
      var spLen = ss * 2.5 + sr() * 3;
      g.strokeStyle = 'rgba(' + cr + ',' + cg + ',' + cb + ',' + (br * 0.2) + ')';
      g.lineWidth = 0.3;
      g.beginPath(); g.moveTo(sx - spLen, sy); g.lineTo(sx + spLen, sy); g.stroke();
      g.beginPath(); g.moveTo(sx, sy - spLen * 0.7); g.lineTo(sx, sy + spLen * 0.7); g.stroke();
    }
  }

  // ===== Vignette =====
  g.globalCompositeOperation = 'source-over';
  var vg = g.createRadialGradient(bw / 2, bh / 2, bw * 0.15, bw / 2, bh / 2, bw * 0.6);
  vg.addColorStop(0, 'rgba(4,6,16,0)');
  vg.addColorStop(0.6, 'rgba(4,6,16,0)');
  vg.addColorStop(0.85, 'rgba(8,12,25,0.3)');
  vg.addColorStop(1, 'rgba(5,8,18,0.55)');
  g.fillStyle = vg; g.fillRect(0, 0, bw, bh);

  if (bgSprite.texture !== PIXI.Texture.EMPTY) bgSprite.texture.destroy(true);
  bgSprite.texture = PIXI.Texture.from(c);
  bgSprite.width = screenW;
  bgSprite.height = screenH;
}

// ===== Layout Engine =====

// --- Community Detection ---
// Union-Find for connected components on high-similarity links within each category
function detectClusters(catMemIds, catLinks) {
  var parent = {}, rank = {};
  catMemIds.forEach(function(id) { parent[id] = id; rank[id] = 0; });
  function find(x) { while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; } return x; }
  function union(a, b) {
    var ra = find(a), rb = find(b);
    if (ra === rb) return;
    if (rank[ra] < rank[rb]) { var t = ra; ra = rb; rb = t; }
    parent[rb] = ra;
    if (rank[ra] === rank[rb]) rank[ra]++;
  }
  catLinks.forEach(function(l) { union(l.source, l.target); });
  // Group by root
  var groups = {};
  catMemIds.forEach(function(id) {
    var root = find(id);
    if (!groups[root]) groups[root] = [];
    groups[root].push(id);
  });
  return Object.values(groups);
}

function autoLabel(memIds) {
  // Pick highest-importance memory, extract first meaningful words
  var best = null, bestImp = -1;
  for (var i = 0; i < memIds.length; i++) {
    var m = nodeMap[memIds[i]];
    if (m && (m.importance || 0) > bestImp) { bestImp = m.importance || 0; best = m; }
  }
  if (!best) return 'cluster';
  var text = (best.content || '').replace(/\[.*?\]/g, '').replace(/[#*_`]/g, '').trim();
  // Extract first meaningful phrase — skip common prefixes
  text = text.replace(/^(Updated|Added|Fixed|Created|Deployed|Completed|Configured|Installed|Set up|Built)\s*/i, '');
  var words = text.split(/\s+/).slice(0, 5).join(' ');
  if (words.length > 35) words = words.slice(0, 32) + '…';
  return words || 'cluster';
}

function computeLayout() {
  var cx = screenW / 2, cy = screenH / 2;
  centerPos = { x: cx, y: cy };

  var catGroups = {};
  var catList = Object.keys(COLORS);
  catList.forEach(function(c) { catGroups[c] = []; });
  memories.forEach(function(m) {
    var cat = m.category || 'general';
    if (!catGroups[cat]) catGroups[cat] = [];
    catGroups[cat].push(m);
  });

  var activeCats = catList.filter(function(c) { return catGroups[c] && catGroups[c].length > 0; });

  // Scale nucleus radius based on total memory count
  var totalMems = memories.length;
  var dynamicR = Math.max(400, 250 + Math.sqrt(totalMems) * 18);
  NUCLEUS_R = dynamicR;

  nuclei = {};
  nucleiOrbitData = {};
  trunkSegs = [];

  for (var i = 0; i < activeCats.length; i++) {
    var cat = activeCats[i];
    var angle = (i / activeCats.length) * Math.PI * 2 - Math.PI / 2;
    var nx = cx + Math.cos(angle) * NUCLEUS_R;
    var ny = cy + Math.sin(angle) * NUCLEUS_R;
    nuclei[cat] = { x: nx, y: ny, angle: angle, count: catGroups[cat].length };

    var dir = Math.sin(i * 3.7 + 0.5) > 0 ? 1 : -1;
    nucleiOrbitData[cat] = {
      baseAngle: angle,
      angSpeed: NUCLEUS_ORBIT_SPEED * (0.8 + Math.sin(i * 2.7) * 0.4) * dir
    };

    var curvature = 25 + Math.sin(i * 1.7) * 15;
    trunkSegs.push({ _isTrunk: true, _curveOff: curvature, col: COLORS[cat], cat: cat });
  }

  // ===== d3-force positioning =====
  clusters = {};
  clusterPositions = {};
  clusterOrbitData = {};
  clusterProcessOrder = [];
  memToCluster = {};
  nodePositions = {};
  orbitData = {};
  nodeProcessOrder = [];
  branchSegs = [];

  // Build force simulation nodes — one per memory
  var forceNodes = [];
  var fnMap = {};
  for (var i = 0; i < memories.length; i++) {
    var m = memories[i];
    var cat = m.category || 'general';
    var nuc = nuclei[cat];
    // Seed position near category nucleus with jitter
    var fn = {
      id: m.id,
      category: cat,
      importance: m.importance || 5,
      radius: nodeRadius(m),
      x: (nuc ? nuc.x : cx) + (Math.random() - 0.5) * 160,
      y: (nuc ? nuc.y : cy) + (Math.random() - 0.5) * 160
    };
    forceNodes.push(fn);
    fnMap[m.id] = fn;
  }

  // Build force links from actual similarity links
  var nodeIdSet = {};
  for (var i = 0; i < forceNodes.length; i++) nodeIdSet[forceNodes[i].id] = true;
  var forceLinks = [];
  for (var i = 0; i < links.length; i++) {
    var l = links[i];
    if (nodeIdSet[l.source] && nodeIdSet[l.target]) {
      forceLinks.push({ source: l.source, target: l.target, similarity: l.similarity || 0.5 });
    }
  }

  // Run d3-force simulation
  var sim = d3.forceSimulation(forceNodes)
    .force('charge', d3.forceManyBody()
      .strength(function(d) { return -20 - d.radius * 4; })
      .distanceMax(500))
    .force('link', d3.forceLink(forceLinks)
      .id(function(d) { return d.id; })
      .distance(function(d) { return 35 + (1 - d.similarity) * 80; })
      .strength(function(d) { return 0.1 + d.similarity * 0.4; }))
    .force('collision', d3.forceCollide()
      .radius(function(d) { return d.radius * 2 + 2; })
      .strength(0.6))
    .force('categoryX', d3.forceX()
      .x(function(d) { var n = nuclei[d.category]; return n ? n.x : cx; })
      .strength(0.06))
    .force('categoryY', d3.forceY()
      .y(function(d) { var n = nuclei[d.category]; return n ? n.y : cy; })
      .strength(0.06))
    .force('center', d3.forceCenter(cx, cy).strength(0.008))
    .alphaDecay(0.02)
    .velocityDecay(0.35);

  // Warm up: run 200 ticks for stable initial layout
  sim.alpha(1);
  for (var t = 0; t < 200; t++) sim.tick();
  sim.stop();

  // Store simulation reference for live ticking
  if (typeof _forceSim !== 'undefined' && _forceSim) _forceSim.stop();
  _forceSim = sim;
  _forceNodes = forceNodes;
  _fnMap = fnMap;

  // ===== Cluster Detection (same as original) =====
  var clusterIdCounter = 1;

  activeCats.forEach(function(cat) {
    var mems = catGroups[cat];
    if (!mems || mems.length === 0) return;
    var nuc = nuclei[cat];
    var col = COLORS[cat] || COLORS.general;

    var catIdSet = {};
    mems.forEach(function(m) { catIdSet[m.id] = true; });
    var catLinks = links.filter(function(l) {
      return catIdSet[l.source] && catIdSet[l.target] && (l.similarity || 0) >= CLUSTER_SIM_THRESHOLD;
    });

    var memIds = mems.map(function(m) { return m.id; });
    var groups = detectClusters(memIds, catLinks);

    var clusterGroups = [];
    var individualMems = [];
    groups.forEach(function(group) {
      if (group.length >= CLUSTER_THRESHOLD) {
        clusterGroups.push(group);
      } else {
        group.forEach(function(id) { individualMems.push(nodeMap[id]); });
      }
    });

    // Clusters: use centroid of force positions
    clusterGroups.sort(function(a, b) { return b.length - a.length; });
    clusterGroups.forEach(function(group) {
      var cid = 'c' + (clusterIdCounter++);
      var avgImp = 0, sumX = 0, sumY = 0;
      group.forEach(function(id) {
        avgImp += (nodeMap[id].importance || 5);
        var fn = fnMap[id];
        if (fn) { sumX += fn.x; sumY += fn.y; }
      });
      avgImp /= group.length;
      var clx = sumX / group.length;
      var cly = sumY / group.length;

      var label = autoLabel(group);
      clusters[cid] = {
        id: cid, cat: cat, label: label,
        memIds: group, importance: avgImp,
        expanded: !!expandedClusters[cid]
      };
      group.forEach(function(mid) { memToCluster[mid] = cid; });
      clusterPositions[cid] = { x: clx, y: cly };

      // Orbital data for gentle drift
      var cAngle = Math.atan2(cly - nuc.y, clx - nuc.x);
      var cDist = Math.sqrt((clx - nuc.x) * (clx - nuc.x) + (cly - nuc.y) * (cly - nuc.y));
      var cDir = Math.sin(group[0] * 3.1) > 0 ? 1 : -1;
      clusterOrbitData[cid] = {
        parentType: 'nucleus', parentKey: cat,
        baseAngle: cAngle, baseDist: cDist,
        angSpeed: ROOT_ORBIT_SPEED * 0.3 * cDir
      };
      clusterProcessOrder.push(cid);

      var bCurve = cDist * 0.2 * (Math.sin(group[0] * 2.1) > 0 ? 1 : -1);
      branchSegs.push({ _isTrunk: false, _curveOff: bCurve, col: col, depth: 0, fromId: null, toId: cid, cat: cat, isCluster: true });

      // Place children if expanded
      if (clusters[cid].expanded) {
        group.forEach(function(mid) {
          var fn = fnMap[mid];
          if (fn) {
            nodePositions[mid] = { x: fn.x, y: fn.y, depth: 1 };
            var mAngle = Math.atan2(fn.y - cly, fn.x - clx);
            var mDist = Math.sqrt((fn.x - clx) * (fn.x - clx) + (fn.y - cly) * (fn.y - cly));
            var mDir = Math.sin(mid * 2.7) > 0 ? 1 : -1;
            orbitData[mid] = {
              parentType: 'cluster', parentKey: cid,
              baseAngle: mAngle, baseDist: mDist,
              angSpeed: CHILD_ORBIT_SPEED * 0.2 * mDir
            };
            nodeProcessOrder.push(mid);
            branchSegs.push({ _isTrunk: false, _curveOff: mDist * 0.15 * (Math.sin(mid * 1.9) > 0 ? 1 : -1), col: col, depth: 1, fromId: cid, toId: mid, cat: cat, fromCluster: true });
          }
        });
      }
    });

    // Individual nodes: use force positions directly
    individualMems.forEach(function(m) {
      var fn = fnMap[m.id];
      if (!fn) return;
      nodePositions[m.id] = { x: fn.x, y: fn.y, depth: 0 };

      // Compute angle/dist from nucleus for gentle orbital drift
      var mAngle = Math.atan2(fn.y - nuc.y, fn.x - nuc.x);
      var mDist = Math.sqrt((fn.x - nuc.x) * (fn.x - nuc.x) + (fn.y - nuc.y) * (fn.y - nuc.y));
      var rDir = Math.sin(m.id * 3.1) > 0 ? 1 : -1;
      orbitData[m.id] = {
        parentType: 'nucleus', parentKey: cat,
        baseAngle: mAngle, baseDist: mDist,
        angSpeed: ROOT_ORBIT_SPEED * 0.4 * (0.6 + Math.sin(m.id * 1.3) * 0.4) * rDir
      };
      nodeProcessOrder.push(m.id);

      var bCurve2 = mDist * 0.2 * (Math.sin(m.id * 2.1) > 0 ? 1 : -1);
      branchSegs.push({ _isTrunk: false, _curveOff: bCurve2, col: col, depth: 0, fromId: null, toId: m.id, cat: cat });
    });
  });

  initParticles();
}

function placeClusterChildren(cid, clx, cly, baseAngle, col, cat) {
  var cluster = clusters[cid];
  if (!cluster) return;
  var mems = cluster.memIds.map(function(id) { return nodeMap[id]; }).filter(Boolean);
  mems.sort(function(a, b) { return (b.importance || 0) - (a.importance || 0); });

  for (var ci = 0; ci < mems.length; ci++) {
    var m = mems[ci];
    var childAngle = baseAngle + GOLDEN_ANGLE * ci;
    var childDist = 25 + Math.sqrt(ci) * 14;
    var mx = clx + Math.cos(childAngle) * childDist;
    var my = cly + Math.sin(childAngle) * childDist;
    nodePositions[m.id] = { x: mx, y: my, depth: 1 };

    var cDir = Math.sin(m.id * 2.7) > 0 ? 1 : -1;
    orbitData[m.id] = {
      parentType: 'cluster', parentKey: cid,
      baseAngle: childAngle, baseDist: childDist,
      angSpeed: CHILD_ORBIT_SPEED * 0.6 * (0.5 + Math.sin(m.id * 2.1) * 0.5) * cDir
    };
    nodeProcessOrder.push(m.id);

    var bCurve = childDist * 0.15 * (Math.sin(m.id * 1.9) > 0 ? 1 : -1);
    branchSegs.push({ _isTrunk: false, _curveOff: bCurve, col: col, depth: 1, fromId: cid, toId: m.id, cat: cat, fromCluster: true });
  }
}

function placeChildren(parentId, px, py, parentAngle, parentDist, depth, col, cat, childrenOf) {
  var children = childrenOf[parentId];
  if (!children || children.length === 0) return;
  var spreadNarrow = Math.PI * 0.6 / Math.pow(1.5, depth);
  var childDist = 45 + 14 / (depth + 1);
  for (var ci = 0; ci < children.length; ci++) {
    var child = children[ci];
    var childAngle = children.length === 1
      ? parentAngle + Math.sin(child.id * 1.3) * 0.15
      : parentAngle - spreadNarrow / 2 + (ci / (children.length - 1)) * spreadNarrow;
    var cNoise = Math.sin(child.id * 4.3) * 5;
    var actualDist = childDist + cNoise;
    var cxp = px + Math.cos(childAngle) * actualDist;
    var cyp = py + Math.sin(childAngle) * actualDist;
    nodePositions[child.id] = { x: cxp, y: cyp, depth: depth };

    var cDir = Math.sin(child.id * 2.7) > 0 ? 1 : -1;
    orbitData[child.id] = {
      parentType: 'node', parentKey: parentId,
      baseAngle: childAngle, baseDist: actualDist,
      angSpeed: CHILD_ORBIT_SPEED * (0.5 + Math.sin(child.id * 2.1) * 0.5) * cDir / (1 + depth * 0.3)
    };
    nodeProcessOrder.push(child.id);

    var bCurve = actualDist * 0.15 * (Math.sin(child.id * 1.9) > 0 ? 1 : -1);
    branchSegs.push({ _isTrunk: false, _curveOff: bCurve, col: col, depth: depth, fromId: parentId, toId: child.id, cat: cat });

    placeChildren(child.id, cxp, cyp, childAngle, actualDist, depth + 1, col, cat, childrenOf);
  }
}

function initParticles() {
  branchParticles = [];
  var total = branchSegs.length + trunkSegs.length;
  if (total === 0) return;
  var maxP = Math.min(total * 1.5, MAX_BRANCH_PARTICLES) | 0;
  for (var i = 0; i < maxP; i++) {
    var isTrunk = trunkSegs.length > 0 && Math.random() < 0.25;
    branchParticles.push({
      isTrunk: isTrunk,
      segIdx: isTrunk ? (Math.random() * trunkSegs.length | 0) : (Math.random() * branchSegs.length | 0),
      t: Math.random(),
      speed: 0.002 + Math.random() * 0.004,
      size: 0.6 + Math.random() * 0.8,
      alpha: 0.15 + Math.random() * 0.25
    });
  }
}

// ===== Animated Position Computation =====
function computeAnimatedPositions() {
  // Hub wobble
  centerAnimPos.x = centerPos.x + Math.sin(time * 0.15) * HUB_WOBBLE + Math.sin(time * 0.31) * HUB_WOBBLE * 0.5;
  centerAnimPos.y = centerPos.y + Math.cos(time * 0.19) * HUB_WOBBLE + Math.cos(time * 0.37) * HUB_WOBBLE * 0.5;

  // Nuclei orbit center
  var ck = Object.keys(nucleiOrbitData);
  for (var i = 0; i < ck.length; i++) {
    var cat = ck[i], od = nucleiOrbitData[cat];
    var a = od.baseAngle + od.angSpeed * time;
    nucleiAnimPos[cat] = {
      x: centerAnimPos.x + Math.cos(a) * NUCLEUS_R,
      y: centerAnimPos.y + Math.sin(a) * NUCLEUS_R
    };
  }

  // Cluster orbit positions (parent-first order)
  for (var i = 0; i < clusterProcessOrder.length; i++) {
    var cid = clusterProcessOrder[i];
    var od = clusterOrbitData[cid];
    if (!od) {
      var bp = clusterPositions[cid];
      clusterAnimPos[cid] = bp ? { x: bp.x, y: bp.y } : { x: 0, y: 0 };
      continue;
    }
    var a = od.baseAngle + od.angSpeed * time;
    var pcx, pcy;
    if (od.parentType === 'nucleus') {
      var nap = nucleiAnimPos[od.parentKey];
      pcx = nap ? nap.x : centerAnimPos.x;
      pcy = nap ? nap.y : centerAnimPos.y;
    } else {
      var pap = clusterAnimPos[od.parentKey];
      pcx = pap ? pap.x : centerAnimPos.x;
      pcy = pap ? pap.y : centerAnimPos.y;
    }
    clusterAnimPos[cid] = { x: pcx + Math.cos(a) * od.baseDist, y: pcy + Math.sin(a) * od.baseDist };
  }

  // Nodes orbit in parent-first order
  for (var i = 0; i < nodeProcessOrder.length; i++) {
    var id = nodeProcessOrder[i];
    var od = orbitData[id];
    if (!od) {
      var bp = nodePositions[id];
      nodeAnimPos[id] = bp ? { x: bp.x, y: bp.y } : { x: 0, y: 0 };
      continue;
    }
    var a = od.baseAngle + od.angSpeed * time;
    var pcx, pcy;
    if (od.parentType === 'nucleus') {
      var nap = nucleiAnimPos[od.parentKey];
      pcx = nap ? nap.x : centerAnimPos.x;
      pcy = nap ? nap.y : centerAnimPos.y;
    } else if (od.parentType === 'cluster') {
      var cap = clusterAnimPos[od.parentKey];
      pcx = cap ? cap.x : centerAnimPos.x;
      pcy = cap ? cap.y : centerAnimPos.y;
    } else {
      var pap = nodeAnimPos[od.parentKey];
      pcx = pap ? pap.x : centerAnimPos.x;
      pcy = pap ? pap.y : centerAnimPos.y;
    }
    nodeAnimPos[id] = { x: pcx + Math.cos(a) * od.baseDist, y: pcy + Math.sin(a) * od.baseDist };
  }
}

function getHighlightPath(memId) {
  var path = [], visited = {}, cur = memId;
  while (cur && !visited[cur]) {
    visited[cur] = true;
    var found = false;
    for (var i = 0; i < branchSegs.length; i++) {
      if (branchSegs[i].toId === cur) { path.push(i); cur = branchSegs[i].fromId; found = true; break; }
    }
    if (!found) break;
  }
  return path;
}

// ===== Scene Building =====
function clearScene() {
  var layers = [glowLayer, orbLayer, coronaLayer, innerLayer, particleLayer, orbitLayer, sparkLayer];
  for (var l = 0; l < layers.length; l++) {
    var ch = layers[l].removeChildren();
    for (var i = 0; i < ch.length; i++) ch[i].destroy();
  }
  var texts = labelLayer.removeChildren();
  for (var i = 0; i < texts.length; i++) texts[i].destroy(true);
  curvesGfx.clear();
  overlayGfx.clear();
  pulseGfx.clear();
  nodeSprites = {};
  nucleiSprites = {};
  clusterSprites = {};
  coronaSprites = {};
  nucLabels = {};
  hubGlow = null; hubOrb = null; hubCorona = null; hubLabel = null; hubInnerGalaxy = null; hubInnerCore = null;
  orbitParts = [];
  pulseRings = [];
  nodeSparks = [];
  energyPulses = [];
  energyPulsePool = [];
  nextPulseTime = {};
}

function buildScene() {
  clearScene();

  // Recompute highlight path
  hlSet = {}; hlIndexSet = {};
  if (selectedNode) {
    var hlIndices = getHighlightPath(selectedNode.id);
    for (var i = 0; i < hlIndices.length; i++) {
      hlIndexSet[hlIndices[i]] = true;
      var seg = branchSegs[hlIndices[i]];
      hlSet[seg.toId] = true;
      if (seg.fromId) hlSet[seg.fromId] = true;
    }

  // ===== Center Hub =====
  hubGlow = new PIXI.Sprite(glowTex);
  hubGlow.anchor.set(0.5);
  hubGlow.tint = 0xf0e0c0;
  hubGlow.blendMode = PIXI.BLEND_MODES.ADD;
  hubGlow.position.set(centerAnimPos.x, centerAnimPos.y);
  glowLayer.addChild(hubGlow);

  hubOrb = new PIXI.Sprite(orbTex);

  hubOrb.tint = 0xf0e0c0;

  hubCorona.position.set(centerAnimPos.x, centerAnimPos.y);

  hubInnerGalaxy.blendMode = PIXI.BLEND_MODES.ADD;
  hubInnerGalaxy.position.set(centerAnimPos.x, centerAnimPos.y);

  // Hub inner core
  hubInnerCore = new PIXI.Sprite(innerCoreTex);

  hubInnerCore.blendMode = PIXI.BLEND_MODES.ADD;
  hubInnerCore.position.set(centerAnimPos.x, centerAnimPos.y);
  innerLayer.addChild(hubInnerCore);

  hubLabel = new PIXI.Text('ENGRAM', {
    fontFamily: 'Inter, sans-serif', fontSize: 20, fontWeight: '500', fill: 0xf0e0c0
  });
  hubLabel.anchor.set(0.5, 0);
  hubLabel.position.set(centerAnimPos.x, centerAnimPos.y + CENTER_HUB_R + 4);
  labelLayer.addChild(hubLabel);

  // Hub orbit particles
  for (var i = 0; i < ORBIT_PER_HUB; i++) {

    spr.blendMode = PIXI.BLEND_MODES.ADD;

  var catKeys = Object.keys(nuclei);

    nc.anchor.set(0.5);
    nc.tint = col.hex;

    coronaLayer.addChild(nc);

    nucleiSprites[cat] = { glow: ng, orb: no, corona: nc };

    var nameLabel = new PIXI.Text(cat.toUpperCase(), {
      fontFamily: 'Inter, sans-serif', fontSize: 20, fontWeight: '600', fill: col.hex
    });
    nameLabel.anchor.set(0.5, 0);
    nameLabel.position.set(nap.x, nap.y + NUCLEUS_ORB_R + 4);

    var countLabel = new PIXI.Text(nuclei[cat].count + ' memories', {

    labelLayer.addChild(countLabel);

    nucLabels[cat] = { name: nameLabel, count: countLabel };

    for (var oi = 0; oi < ORBIT_PER_NUCLEUS; oi++) {

      orbitLayer.addChild(ospr);
      orbitParts.push({
        cx: nap.x, cy: nap.y,
        angle: (oi / ORBIT_PER_NUCLEUS) * Math.PI * 2,
        speed: 0.35 + Math.random() * 0.45,
        radiusX: NUCLEUS_ORB_R * (1.8 + Math.random() * 2.2),
        radiusY: NUCLEUS_ORB_R * (1.0 + Math.random() * 2.0),
        tilt: Math.random() * Math.PI * 0.4,
        size: 0.7 + Math.random() * 1.3,
        alpha: 0.2 + Math.random() * 0.3,
        sprite: ospr, isHub: false, cat: cat
      });
    }
    nextPulseTime[cat] = time + rng(0.5, PULSE_MAX);
  }

  // ===== Cluster Constellation Orbs =====
  clusterSprites = {};
  var cids = Object.keys(clusters);
  for (var ci = 0; ci < cids.length; ci++) {
    var cid = cids[ci];
    var cluster = clusters[cid];
    var ap = clusterAnimPos[cid] || clusterPositions[cid];
    if (!ap) continue;
    var col = COLORS[cluster.cat] || COLORS.general;

    var cg = new PIXI.Sprite(glowTex);

    cg.blendMode = PIXI.BLEND_MODES.ADD;
    cg.position.set(ap.x, ap.y);

    // Cluster orb — bigger, uses count to scale

    // Cluster corona
    var cc = new PIXI.Sprite(coronaTex);
    cc.anchor.set(0.5);
    cc.tint = col.hex;
    cc.blendMode = PIXI.BLEND_MODES.ADD;
    cc.position.set(ap.x, ap.y);
    coronaLayer.addChild(cc);

    // Inner galaxy for cluster
    var cig = new PIXI.Sprite(innerGalaxyTex);
    cig.anchor.set(0.5);
    cig.tint = col.hex;
    cig.blendMode = PIXI.BLEND_MODES.ADD;
    cig.position.set(ap.x, ap.y);
    innerLayer.addChild(cig);

    // Count badge label
    var badgeText = cluster.memIds.length + '';
    var badge = new PIXI.Text(badgeText, {
      fontFamily: 'JetBrains Mono, monospace', fontSize: 14, fontWeight: '700',
      fill: 0xffffff, stroke: col.hex, strokeThickness: 2
    });
    badge.anchor.set(0.5);
    badge.position.set(ap.x, ap.y);
    labelLayer.addChild(badge);

    // Cluster label
    var clLabel = new PIXI.Text(cluster.label, {
      fontFamily: 'Inter, sans-serif', fontSize: 11, fontWeight: '500',
      fill: col.hex, wordWrap: true, wordWrapWidth: 120
    });
    clLabel.anchor.set(0.5, 0);
    clLabel.position.set(ap.x, ap.y + 20);
    labelLayer.addChild(clLabel);

    clusterSprites[cid] = { glow: cg, orb: co, corona: cc, innerGalaxy: cig, badge: badge, label: clLabel };
  }

  // ===== Memory Nodes =====
  for (var mi = 0; mi < memories.length; mi++) {
    var m = memories[mi];

    // Skip memories that are in a collapsed cluster
    var mCluster = memToCluster[m.id];
    if (mCluster && !clusters[mCluster].expanded) continue;

    var ap = nodeAnimPos[m.id] || nodePositions[m.id];
    if (!ap) continue;
    var col = COLORS[m.category] || COLORS.general;

    var mg = new PIXI.Sprite(glowTex);
    mg.anchor.set(0.5);
    mg.tint = col.hex;
    mg.blendMode = PIXI.BLEND_MODES.ADD;
    mg.position.set(ap.x, ap.y);
    glowLayer.addChild(mg);

    var mo = new PIXI.Sprite(orbTex);
    mo.anchor.set(0.5);
    mo.tint = col.hex;
    mo.position.set(ap.x, ap.y);
    orbLayer.addChild(mo);

    var mc = new PIXI.Sprite(coronaTex);
    mc.anchor.set(0.5);
    mc.tint = col.hex;
    mc.blendMode = PIXI.BLEND_MODES.ADD;

    // Inner galaxy spiral
    var mig = new PIXI.Sprite(innerGalaxyTex);

  }

  // ===== Branch Particle Sprites =====
  for (var pi = 0; pi < branchParticles.length; pi++) {
