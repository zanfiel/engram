<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Engram</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #070a0f; color: #c8ccd4; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
  canvas { position: fixed; top: 0; left: 0; display: block; }

  .glass {
    background: rgba(15, 20, 25, 0.55);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; gap: 16px; padding: 10px 20px;
    background: rgba(15,20,25,0.75);
    backdrop-filter: blur(30px) saturate(1.5);
    -webkit-backdrop-filter: blur(30px) saturate(1.5);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
  }
  #topbar h1 {
    font-size: 15px; font-weight: 700; color: #e2e4e9;
    letter-spacing: 1.5px; white-space: nowrap; text-transform: uppercase;
  }
  #topbar h1 span {
    background: linear-gradient(135deg, #7b8fff 0%, #b28dff 50%, #c084fc 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-glow { display: inline-block; filter: drop-shadow(0 0 8px rgba(129,140,248,0.3)); }
  #search-box { flex: 1; max-width: 380px; position: relative; }
  #search-box input {
    width: 100%; padding: 8px 14px 8px 34px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; color: #e2e4e9; font-size: 12px;
    font-family: 'Inter', sans-serif; outline: none;
    transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  #search-box input:focus {
    border-color: rgba(129,140,248,0.5);
    background: rgba(255,255,255,0.07);
    box-shadow: 0 0 24px rgba(129,140,248,0.12), 0 0 60px rgba(129,140,248,0.04);
  }
  #search-box input::placeholder { color: #3a3a50; }
  #search-box svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: 0.3; }
  .stats {
    display: flex; gap: 14px; margin-left: auto;
    font-size: 11px; color: #3a3a50;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px;
  }
  .stats .val {
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-weight: 500;
  }

  #sidebar {
    position: fixed; top: 0; right: -460px; width: 460px; height: 100vh; z-index: 20;
    background: rgba(15,20,25,0.92);
    backdrop-filter: blur(32px) saturate(1.6);
    -webkit-backdrop-filter: blur(32px) saturate(1.6);
    border-left: 1px solid rgba(255,255,255,0.05);
    box-shadow: -12px 0 60px rgba(0,0,0,0.5), inset 1px 0 0 rgba(255,255,255,0.03);
    transition: right 0.5s cubic-bezier(0.16,1,0.3,1);
    overflow-y: auto; padding: 28px;
  }
  #sidebar.open { right: 0; }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
  .close-btn {
    position: absolute; top: 16px; right: 16px; width: 30px; height: 30px;
    border-radius: 10px; border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03); color: #555; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .close-btn:hover { background: rgba(255,255,255,0.08); color: #aaa; transform: rotate(90deg); }
  .mem-header { margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .mem-id {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px; letter-spacing: 0.5px;
  }
  .mem-category {
    display: inline-block; padding: 3px 10px; border-radius: 6px;
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
  }
  .mem-content {
    font-size: 12.5px; line-height: 1.8; color: #a0a4b0;
    margin: 16px 0; white-space: pre-wrap; word-break: break-word;
  }
  .mem-meta {
    display: grid; grid-template-columns: auto 1fr;
    gap: 6px 16px; font-size: 11px; margin-top: 16px;
    padding: 14px; border-radius: 10px;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03);
  }
  .mem-meta .label { color: #3a3a50; font-family: 'JetBrains Mono', monospace; font-size: 10px; }
  .mem-meta .value { color: #777; }
  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 9px; font-weight: 600; margin-left: 6px; letter-spacing: 0.5px;
  }
  .badge-static { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.1); }
  .badge-forgotten { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.1); }
  .badge-inference { background: rgba(168,85,247,0.1); color: #c084fc; border: 1px solid rgba(168,85,247,0.1); }
  .linked-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.04); }
  .linked-section h3 {
    font-size: 10px; color: #3a3a50; margin-bottom: 12px;
    font-weight: 500; text-transform: uppercase; letter-spacing: 1px;
  }
  .linked-item {
    padding: 10px 12px; margin-bottom: 4px; border-radius: 10px;
    background: rgba(255,255,255,0.02); cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1); border: 1px solid transparent;
  }
  .linked-item:hover {
    background: rgba(129,140,248,0.05); border-color: rgba(129,140,248,0.1);
    transform: translateX(2px);
  }
  .linked-item .link-type {
    font-size: 9px; font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .linked-item .link-preview { font-size: 11px; color: #555; margin-top: 4px; line-height: 1.5; }

  #tooltip {
    position: fixed; z-index: 30; pointer-events: none;
    background: rgba(15,20,25,0.92); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 12px 16px; max-width: 320px;
    opacity: 0; transition: opacity 0.25s;
    backdrop-filter: blur(16px) saturate(1.4);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(129,140,248,0.04);
  }
  #tooltip .tt-id { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #818cf8; }
  #tooltip .tt-cat { font-size: 9px; text-transform: uppercase; margin-left: 6px; font-weight: 600; letter-spacing: 0.5px; }
  #tooltip .tt-text { font-size: 11px; color: #777; margin-top: 6px; line-height: 1.55; }

  #loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 50;
    text-align: center;
  }
  .spinner {
    width: 32px; height: 32px; border: 2px solid rgba(129,140,248,0.1);
    border-top-color: #818cf8; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    box-shadow: 0 0 20px rgba(129,140,248,0.15);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .text { font-size: 12px; color: #3a3a50; letter-spacing: 0.5px; }

  /* ===== List Panel (Left) ===== */
  #list-toggle {
    width: 34px; height: 34px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.04); color: #666; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1); flex-shrink: 0;
  }
  #list-toggle:hover { background: rgba(129,140,248,0.12); color: #818cf8; border-color: rgba(129,140,248,0.2); }
  #list-toggle.active { background: rgba(129,140,248,0.15); color: #818cf8; border-color: rgba(129,140,248,0.3); box-shadow: 0 0 16px rgba(129,140,248,0.1); }

  #list-panel {
    position: fixed; top: 0; left: -420px; width: 420px; height: 100vh; z-index: 15;
    background: rgba(8,11,18,0.96);
    backdrop-filter: blur(40px) saturate(1.6);
    -webkit-backdrop-filter: blur(40px) saturate(1.6);
    border-right: 1px solid rgba(129,140,248,0.08);
    box-shadow: 12px 0 60px rgba(0,0,0,0.6), inset -1px 0 0 rgba(255,255,255,0.02);
    transition: left 0.5s cubic-bezier(0.16,1,0.3,1);
    display: flex; flex-direction: column;
  }
  #list-panel.open { left: 0; }

  .lp-header { padding: 16px 16px 0; flex-shrink: 0; }
  .lp-title {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding-top: 50px;
  }
  .lp-title h2 {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .lp-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #3a3a50; }

  .lp-search { position: relative; margin-bottom: 12px; }
  .lp-search input {
    width: 100%; padding: 10px 38px 10px 36px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; color: #e2e4e9; font-size: 12px;
    font-family: 'Inter', sans-serif; outline: none;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .lp-search input:focus {
    border-color: rgba(129,140,248,0.5); background: rgba(255,255,255,0.06);
    box-shadow: 0 0 24px rgba(129,140,248,0.12);
  }
  .lp-search input::placeholder { color: #2a2a3a; }
  .lp-search .lp-search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.3; pointer-events: none;
  }
  .lp-search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    width: 20px; height: 20px; border-radius: 5px; border: none;
    background: rgba(255,255,255,0.06); color: #555; cursor: pointer;
    font-size: 12px; display: none; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .lp-search-clear.visible { display: flex; }
  .lp-search-clear:hover { background: rgba(255,255,255,0.12); color: #aaa; }

  .lp-filters { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .lp-chip {
    padding: 4px 10px; border-radius: 20px; font-size: 9px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); color: #444;
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1); user-select: none;
  }
  .lp-chip:hover { background: rgba(255,255,255,0.05); color: #777; }
  .lp-chip.active {
    border-color: var(--chip-color, rgba(129,140,248,0.4));
    background: var(--chip-bg, rgba(129,140,248,0.12));
    color: var(--chip-color, #818cf8);
    box-shadow: 0 0 14px var(--chip-glow, rgba(129,140,248,0.1));
  }
  .lp-chip .lp-chip-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    margin-right: 5px; vertical-align: middle;
  }
  .lp-chip .lp-chip-count {
    font-size: 8px; opacity: 0.5; margin-left: 4px;
  }

  .lp-sort-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
    padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .lp-sort-label { font-size: 9px; color: #2a2a3a; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .lp-sort-btn {
    padding: 3px 8px; border-radius: 5px; font-size: 9px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.02);
    color: #3a3a50; transition: all 0.2s; font-family: 'JetBrains Mono', monospace;
  }
  .lp-sort-btn:hover { color: #777; background: rgba(255,255,255,0.04); }
  .lp-sort-btn.active { color: #818cf8; border-color: rgba(129,140,248,0.3); background: rgba(129,140,248,0.06); }

  .lp-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
  .lp-list::-webkit-scrollbar { width: 3px; }
  .lp-list::-webkit-scrollbar-track { background: transparent; }
  .lp-list::-webkit-scrollbar-thumb { background: rgba(129,140,248,0.15); border-radius: 3px; }
  .lp-list::-webkit-scrollbar-thumb:hover { background: rgba(129,140,248,0.3); }

  /* Supermemory-style cards */
  .lp-card {
    padding: 14px 16px; margin-bottom: 8px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(15,20,30,0.8) 0%, rgba(20,25,40,0.6) 100%);
    border: 1px solid rgba(255,255,255,0.04);
    cursor: pointer; transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
    position: relative; overflow: hidden;
  }
  .lp-card::before {
    content: ''; position: absolute; inset: 0; border-radius: 12px;
    background: radial-gradient(ellipse at 50% 0%, var(--card-glow, rgba(129,140,248,0.06)) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.35s;
  }
  .lp-card::after {
    content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px;
    background: var(--card-accent, #818cf8); border-radius: 2px;
    opacity: 0; transition: opacity 0.3s;
  }
  .lp-card:hover {
    border-color: var(--card-border-hover, rgba(129,140,248,0.15));
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 20px var(--card-glow, rgba(129,140,248,0.04));
  }
  .lp-card:hover::before { opacity: 1; }
  .lp-card:hover::after { opacity: 0.8; }
  .lp-card.active-card {
    border-color: var(--card-accent, rgba(129,140,248,0.25));
    background: linear-gradient(135deg, rgba(20,25,40,0.9) 0%, rgba(25,30,50,0.7) 100%);
    box-shadow: 0 4px 24px var(--card-glow, rgba(129,140,248,0.08));
  }
  .lp-card.active-card::after { opacity: 1; }

  .lp-card-type {
    display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
  }
  .lp-card-type svg { opacity: 0.5; flex-shrink: 0; }
  .lp-card-type-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px;
    color: var(--card-accent, #818cf8);
  }
  .lp-card-id {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #333;
    margin-left: auto;
  }

  .lp-card-title {
    font-size: 12px; font-weight: 600; color: #d0d4dc; line-height: 1.4;
    margin-bottom: 6px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .lp-card-preview {
    font-size: 11px; color: #4a4e5c; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 10px;
  }
  .lp-card-footer {
    display: flex; align-items: center; justify-content: space-between;
  }
  .lp-card-imp {
    display: inline-flex; align-items: center; gap: 2px;
  }
  .lp-card-imp .star {
    width: 10px; height: 10px; fill: var(--card-accent, #818cf8); opacity: 0.7;
  }
  .lp-card-imp .star.dim { opacity: 0.15; }
  .lp-card-imp-num {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--card-accent, #818cf8); margin-left: 4px; font-weight: 600;
  }
  .lp-card-date {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #333;
  }
  .lp-card-badges {
    display: flex; gap: 4px; position: absolute; top: 10px; right: 12px;
  }
  .lp-card-badges .badge { margin-left: 0; font-size: 8px; padding: 1px 5px; }

  .lp-empty {
    text-align: center; padding: 50px 20px; color: #2a2a3a;
  }
  .lp-empty svg { opacity: 0.12; margin-bottom: 14px; }
  .lp-empty-text { font-size: 12px; letter-spacing: 0.5px; }
  .lp-empty-sub { font-size: 10px; color: #1a1a2a; margin-top: 6px; }

  .lp-search-status {
    font-size: 9px; color: #818cf8; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; padding: 6px 0 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .lp-search-status .lp-search-clear-results {
    font-size: 9px; color: #555; cursor: pointer; text-decoration: none;
    transition: color 0.2s; text-transform: none; letter-spacing: 0; font-weight: 500;
  }
  .lp-search-status .lp-search-clear-results:hover { color: #818cf8; }

  @keyframes lpCardIn {
    from { opacity: 0; transform: translateY(8px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .lp-card { animation: lpCardIn 0.35s cubic-bezier(0.16,1,0.3,1) backwards; }

  /* ===== Viewport Controls (Bottom-Left, Supermemory-style) ===== */
  #viewport-controls {
    position: fixed; bottom: 20px; left: 20px; z-index: 12;
    display: flex; flex-direction: column; gap: 6px;
    transition: left 0.5s cubic-bezier(0.16,1,0.3,1);
  }
  #viewport-controls.shifted { left: 440px; }
  .vc-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 8px;
    background: rgba(15,20,25,0.8); border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: #666; font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 500;
    cursor: pointer; transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
    white-space: nowrap; user-select: none;
  }
  .vc-btn:hover { background: rgba(129,140,248,0.1); color: #818cf8; border-color: rgba(129,140,248,0.2); }
  .vc-btn svg { opacity: 0.5; flex-shrink: 0; }
  .vc-btn:hover svg { opacity: 0.9; }
  .vc-kbd {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px;
    color: #444; margin-left: auto;
  }
  .vc-zoom-row {
    display: flex; align-items: center; gap: 0;
    border-radius: 8px; overflow: hidden;
    background: rgba(15,20,25,0.8); border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .vc-zoom-btn {
    width: 30px; height: 30px; border: none; background: transparent;
    color: #555; font-size: 14px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: all 0.2s;
  }
  .vc-zoom-btn:hover { background: rgba(129,140,248,0.12); color: #818cf8; }
  .vc-zoom-level {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500;
    color: #555; padding: 0 4px; min-width: 38px; text-align: center;
  }

  /* ===== Legend (Bottom-Left, collapsible) ===== */
  #legend-panel {
    position: fixed; bottom: 130px; left: 20px; z-index: 12;
    transition: left 0.5s cubic-bezier(0.16,1,0.3,1);
  }
  #legend-panel.shifted { left: 440px; }
  .legend-toggle {
    display: flex; align-items: center; gap: 6px; padding: 7px 12px;
    border-radius: 8px; background: rgba(15,20,25,0.8);
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: #666; font-size: 11px; font-weight: 500; cursor: pointer;
    transition: all 0.25s; user-select: none; width: 100%;
  }
  .legend-toggle:hover { background: rgba(129,140,248,0.1); color: #818cf8; }
  .legend-toggle svg { transition: transform 0.3s; }
  .legend-toggle.open svg { transform: rotate(180deg); }
  .legend-body {
    margin-top: 4px; padding: 10px 14px; border-radius: 8px;
    background: rgba(15,20,25,0.85); border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    display: none;
  }
  .legend-body.open { display: block; }
  .legend-row {
    display: flex; align-items: center; gap: 8px; padding: 3px 0;
  }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%;

<script>
/* ===== Engram v8.0 — Orbital Galaxy ===== */

// ===== Constants & Colors =====
var BASE = location.origin;
var COLORS = {
  task:      { core: '#ff7b3a', glow: '#e56020', r: 255, g: 123, b: 58,  hex: 0xff7b3a },
  discovery: { core: '#1aedb5', glow: '#0dd49a', r: 26,  g: 237, b: 181, hex: 0x1aedb5 },
  decision:  { core: '#ffd23f', glow: '#e5b820', r: 255, g: 210, b: 63,  hex: 0xffd23f },
  state:     { core: '#7dff3a', glow: '#5ce020', r: 125, g: 255, b: 58,  hex: 0x7dff3a },
  issue:     { core: '#ff3a6e', glow: '#e5204a', r: 255, g: 58,  b: 110, hex: 0xff3a6e },
  general:   { core: '#c4a882', glow: '#a88a68', r: 196, g: 168, b: 130, hex: 0xc4a882 }
};

var NUCLEUS_R = 260, GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));
var CENTER_HUB_R = 22, NUCLEUS_ORB_R = 14;
var BG_HEX = 0x070a0f;
var GRID_SPACING_BASE = 100;
var MAX_BRANCH_PARTICLES = 200;

// Animated sky
var STAR_COUNT = 360;
var DUST_COUNT = 80;
var NEBULA_DRIFT_COUNT = 18;
var SHOOTING_STAR_POOL = 5;
var SHOOT_MIN = 2.5, SHOOT_MAX = 7;

// World effects
var ORBIT_PER_NUCLEUS = 6;
var ORBIT_PER_HUB = 5;
var MAX_PULSE_RINGS = 18;
var PULSE_MIN = 2.5, PULSE_MAX = 5.5;
var NODE_SPARK_CHANCE = 0.003;
var MAX_NODE_SPARKS = 60;

// Orbital motion
var NUCLEUS_ORBIT_SPEED = 0.025;
var ROOT_ORBIT_SPEED = 0.05;
var CHILD_ORBIT_SPEED = 0.07;
var HUB_WOBBLE = 3;

// Energy pulses
var MAX_ENERGY_PULSES = 35;

// ===== State =====
var memories = [], links = [], nodeMap = {};
var transform = d3.zoomIdentity;
var screenW = window.innerWidth, screenH = window.innerHeight;
var hoveredNode = null, selectedNode = null;
var currentFilter = 'all', searchHighlight = new Set();
var time = 0, loadTime = 0, entryProgress = 0;
var dimTarget = 0, dimProgress = 0;

// Layout
var centerPos = { x: 0, y: 0 };
var nuclei = {}, nodePositions = {};
var branchSegs = [], trunkSegs = [];
var hlSet = {}, hlIndexSet = {};

// Branch particles
var branchParticles = [];

// Animated sky state
var stars = [];
var dustParts = [];
var nebulaDrifts = [];
var planetObjs = [];
var shootPool = [];
var nextShootTime = 0;

// World effects state
var orbitParts = [];
var pulseRings = [];
var nextPulseTime = {};
var nodeSparks = [];

// Orbital motion state
var orbitData = {};
var nucleiOrbitData = {};
var nodeProcessOrder = [];
var nodeAnimPos = {};
var nucleiAnimPos = {};
var centerAnimPos = { x: 0, y: 0 };

// Energy pulses state
var energyPulses = [];
var energyPulsePool = [];

// Refresh
var REFRESH_INTERVAL = 30000;
var lastMemoryCount = 0, lastMaxId = 0, refreshTimer = null;

// ===== Helpers =====
function clamp01(x) { return x < 0 ? 0 : x > 1 ? 1 : x; }
function easeOutExpo(x) { return x === 1 ? 1 : 1 - Math.pow(2, -10 * x); }
function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }
function nodeRadius(m) { return 3.5 + Math.sqrt(m.importance || 1) * 2.5 + (m.source_count > 1 ? Math.log2(m.source_count) * 1.3 : 0); }
function nodeCol(m) { return COLORS[m.category] || COLORS.general; }
function nodeVisible(m) { return currentFilter === 'all' || m.category === currentFilter; }
function bezierPt(x1, y1, cx, cy, x2, y2, t) {
  var u = 1 - t;
  return { x: u*u*x1 + 2*u*t*cx + t*t*x2, y: u*u*y1 + 2*u*t*cy + t*t*y2 };
}
function rng(a, b) { return a + Math.random() * (b - a); }

// Dynamic curve endpoint computation from animated positions
function getSegPts(seg) {
  var fp, tp;
  if (seg._isTrunk) {
    fp = centerAnimPos;
    tp = nucleiAnimPos[seg.cat] || centerAnimPos;
  } else {
    fp = seg.fromId === null
      ? (nucleiAnimPos[seg.cat] || centerAnimPos)
      : (nodeAnimPos[seg.fromId] || centerAnimPos);
    tp = nodeAnimPos[seg.toId] || centerAnimPos;
  }
  var mx = (fp.x + tp.x) * 0.5, my = (fp.y + tp.y) * 0.5;
  var dx = tp.x - fp.x, dy = tp.y - fp.y;
  var len = Math.sqrt(dx * dx + dy * dy) || 1;
  return {
    x1: fp.x, y1: fp.y,
    cx: mx + (-dy / len) * seg._curveOff,
    cy: my + (dx / len) * seg._curveOff,
    x2: tp.x, y2: tp.y
  };
}

// ===== PixiJS Application =====
var app = new PIXI.Application({
  width: screenW, height: screenH,
  backgroundColor: BG_HEX,
  resolution: window.devicePixelRatio || 1,
  autoDensity: true,
  antialias: true
});
app.view.style.position = 'fixed';
app.view.style.top = '0';
app.view.style.left = '0';
document.body.insertBefore(app.view, document.getElementById('topbar'));

// ===== Scene Graph =====
// Screen-space layers
var bgSprite = new PIXI.Sprite(PIXI.Texture.EMPTY);
var nebulaLayer = new PIXI.Container();
var planetLayer = new PIXI.Container();
var starLayer = new PIXI.Container();
var dustLayer = new PIXI.Container();
var shootGfx = new PIXI.Graphics();
var shootHeadLayer = new PIXI.Container();
var gridGfx = new PIXI.Graphics();

// World-space
var world = new PIXI.Container();
var curvesGfx = new PIXI.Graphics();
var particleLayer = new PIXI.Container();
var pulseGfx = new PIXI.Graphics();
var orbitLayer = new PIXI.Container();
var sparkLayer = new PIXI.Container();
var glowLayer = new PIXI.Container();
var orbLayer = new PIXI.Container();
var coronaLayer = new PIXI.Container();
var overlayGfx = new PIXI.Graphics();
var labelLayer = new PIXI.Container();

// Stage order
app.stage.addChild(bgSprite);
app.stage.addChild(nebulaLayer);
app.stage.addChild(planetLayer);
app.stage.addChild(starLayer);
app.stage.addChild(dustLayer);
app.stage.addChild(shootGfx);
app.stage.addChild(shootHeadLayer);
app.stage.addChild(gridGfx);
app.stage.addChild(world);

// World order
world.addChild(curvesGfx);
world.addChild(particleLayer);
world.addChild(pulseGfx);
world.addChild(orbitLayer);
world.addChild(sparkLayer);
world.addChild(glowLayer);
world.addChild(orbLayer);
world.addChild(coronaLayer);
world.addChild(overlayGfx);
world.addChild(labelLayer);

// Sprite maps
var nodeSprites = {};
var nucleiSprites = {};
var coronaSprites = {};
var hubGlow = null, hubOrb = null, hubCorona = null, hubLabel = null;
var nucLabels = {};

// ===== Textures =====
function mkTex(sz, fn) {
  var c = document.createElement('canvas');
  c.width = sz; c.height = sz;
  fn(c.getContext('2d'), sz);
  return PIXI.Texture.from(c);
}

// Enhanced orb: offset gradient + inner luminance band + specular
var orbTex = mkTex(128, function(g, sz) {
  var cx = sz / 2, cy = sz / 2;
  // Base sphere
  var grad = g.createRadialGradient(cx * 0.65, cy * 0.6, 0, cx, cy, cx * 0.9);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.12, 'rgba(255,255,255,0.75)');
  grad.addColorStop(0.3, 'rgba(255,255,255,0.45)');
  grad.addColorStop(0.55, 'rgba(255,255,255,0.2)');
  grad.addColorStop(0.8, 'rgba(255,255,255,0.07)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad;
  g.beginPath(); g.arc(cx, cy, cx * 0.9, 0, Math.PI * 2); g.fill();
  // Inner luminance ring
  g.globalCompositeOperation = 'lighter';
  var ring = g.createRadialGradient(cx, cy, cx * 0.3, cx, cy, cx * 0.7);
  ring.addColorStop(0, 'rgba(255,255,255,0)');
  ring.addColorStop(0.35, 'rgba(255,255,255,0.06)');
  ring.addColorStop(0.5, 'rgba(255,255,255,0.13)');
  ring.addColorStop(0.65, 'rgba(255,255,255,0.06)');
  ring.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = ring;
  g.beginPath(); g.arc(cx, cy, cx * 0.7, 0, Math.PI * 2); g.fill();
  // Specular highlight
  var spec = g.createRadialGradient(cx * 0.5, cy * 0.45, 0, cx * 0.5, cy * 0.45, cx * 0.18);
  spec.addColorStop(0, 'rgba(255,255,255,0.4)');
  spec.addColorStop(0.5, 'rgba(255,255,255,0.1)');
  spec.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = spec;
  g.beginPath(); g.arc(cx * 0.5, cy * 0.45, cx * 0.18, 0, Math.PI * 2); g.fill();
});

// Glow
var glowTex = mkTex(128, function(g, sz) {
  var cx = sz / 2, cy = sz / 2;
  var grad = g.createRadialGradient(cx, cy, 0, cx, cy, cx);
  grad.addColorStop(0, 'rgba(255,255,255,0.6)');
  grad.addColorStop(0.15, 'rgba(255,255,255,0.25)');
  grad.addColorStop(0.4, 'rgba(255,255,255,0.08)');
  grad.addColorStop(0.7, 'rgba(255,255,255,0.02)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad;
  g.fillRect(0, 0, sz, sz);
});

// Particle
var particleTex = mkTex(32, function(g, sz) {
  var cx = sz / 2, cy = sz / 2;
  var grad = g.createRadialGradient(cx, cy, 0, cx, cy, cx);
  grad.addColorStop(0, 'rgba(255,255,255,0.9)');
  grad.addColorStop(0.3, 'rgba(255,255,255,0.35)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad;
  g.fillRect(0, 0, sz, sz);
});

// Star: 4-pointed twinkle
var starTex = mkTex(32, function(g, sz) {
  var cx = sz / 2, cy = sz / 2;
  var grad = g.createRadialGradient(cx, cy, 0, cx, cy, cx * 0.8);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.12, 'rgba(255,255,255,0.55)');
  grad.addColorStop(0.35, 'rgba(255,255,255,0.12)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad;
  g.fillRect(0, 0, sz, sz);
  g.globalCompositeOperation = 'lighter';
  for (var a = 0; a < 4; a++) {
    g.save();
    g.translate(cx, cy);
    g.rotate(a * Math.PI / 2);
    var sg = g.createLinearGradient(0, 0, cx * 0.9, 0);
    sg.addColorStop(0, 'rgba(255,255,255,0.5)');
    sg.addColorStop(0.5, 'rgba(255,255,255,0.08)');
    sg.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = sg;
    g.fillRect(0, -0.8, cx * 0.9, 1.6);
    g.restore();
  }
});

// Spark
var sparkTex = mkTex(16, function(g, sz) {
  var cx = sz / 2, cy = sz / 2;
  var grad = g.createRadialGradient(cx, cy, 0, cx, cy, cx);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.2, 'rgba(255,255,255,0.6)');
  grad.addColorStop(0.5, 'rgba(255,255,255,0.15)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad;
  g.fillRect(0, 0, sz, sz);
});

// Corona ring: ring-shaped texture with asymmetry for visible rotation
var coronaTex = mkTex(64, function(g, sz) {
  var cx = sz / 2, cy = sz / 2, r = sz / 2;
  // Ring band
  var grad = g.createRadialGradient(cx, cy, r * 0.5, cx, cy, r * 0.95);
  grad.addColorStop(0, 'rgba(255,255,255,0)');
  grad.addColorStop(0.2, 'rgba(255,255,255,0.06)');
  grad.addColorStop(0.45, 'rgba(255,255,255,0.22)');
  grad.addColorStop(0.6, 'rgba(255,255,255,0.18)');
  grad.addColorStop(0.8, 'rgba(255,255,255,0.06)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad;
  g.beginPath(); g.arc(cx, cy, r, 0, Math.PI * 2); g.fill();
  // Asymmetric bright patch for rotation visibility
  g.globalCompositeOperation = 'lighter';
  var ag = g.createRadialGradient(cx * 0.55, cy * 0.55, 0, cx * 0.7, cy * 0.7, r * 0.5);
  ag.addColorStop(0, 'rgba(255,255,255,0.12)');
  ag.addColorStop(0.5, 'rgba(255,255,255,0.04)');
  ag.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = ag;
  g.beginPath(); g.arc(cx * 0.7, cy * 0.7, r * 0.5, 0, Math.PI * 2); g.fill();
});

// Nebula drift texture: soft irregular cloud blob
var nebulaDriftTex = mkTex(256, function(g, sz) {
  var cx = sz / 2, cy = sz / 2;
  // Main soft blob
  var grad = g.createRadialGradient(cx * 0.85, cy * 0.9, 0, cx, cy, cx * 0.92);
  grad.addColorStop(0, 'rgba(255,255,255,0.18)');
  grad.addColorStop(0.15, 'rgba(255,255,255,0.12)');
  grad.addColorStop(0.35, 'rgba(255,255,255,0.06)');
  grad.addColorStop(0.6, 'rgba(255,255,255,0.02)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad;
  g.fillRect(0, 0, sz, sz);
  // Secondary offset lobe for irregularity
  g.globalCompositeOperation = 'lighter';
  var g2 = g.createRadialGradient(cx * 1.25, cy * 0.65, 0, cx * 1.1, cy * 0.8, cx * 0.55);
  g2.addColorStop(0, 'rgba(255,255,255,0.08)');
  g2.addColorStop(0.4, 'rgba(255,255,255,0.03)');
  g2.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = g2;
  g.fillRect(0, 0, sz, sz);
  // Third lobe
  var g3 = g.createRadialGradient(cx * 0.6, cy * 1.3, 0, cx * 0.7, cy * 1.15, cx * 0.45);
  g3.addColorStop(0, 'rgba(255,255,255,0.06)');
  g3.addColorStop(0.5, 'rgba(255,255,255,0.02)');
  g3.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = g3;
  g.fillRect(0, 0, sz, sz);
});

// ===== Background (enhanced galaxy) =====

// Simple hash-based value noise for nebula generation
function _bgNoise(seed) {
  function hash(x, y) {
    var h = (x * 374761393 + y * 668265263 + seed * 1274126177) | 0;
    h = Math.imul(h ^ (h >>> 13), 1103515245);
    h = h ^ (h >>> 16);
    return (h & 0x7fffffff) / 0x7fffffff;
  }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function smooth(t) { return t * t * (3 - 2 * t); }
  return function(x, y) {
    var ix = Math.floor(x), iy = Math.floor(y);
    var fx = smooth(x - ix), fy = smooth(y - iy);
    var a = hash(ix, iy), b = hash(ix + 1, iy);
    var c = hash(ix, iy + 1), d = hash(ix + 1, iy + 1);
    return lerp(lerp(a, b, fx), lerp(c, d, fx), fy);
  };
}

function _bgFbm(noise, x, y, octaves) {
  var val = 0, amp = 0.5, freq = 1, max = 0;
  for (var i = 0; i < octaves; i++) {
    val += noise(x * freq, y * freq) * amp;
    max += amp;
    amp *= 0.5;
    freq *= 2.1;
  }
  return val / max;
}

function buildBackground() {
  var bw = Math.round(screenW * 0.5), bh = Math.round(screenH * 0.5);
  if (bw < 1 || bh < 1) return;
  var c = document.createElement('canvas');
  c.width = bw; c.height = bh;
  var g = c.getContext('2d');
  g.fillStyle = '#050810';
  g.fillRect(0, 0, bw, bh);

  var noise1 = _bgNoise(42);
  var noise2 = _bgNoise(137);
  var noise3 = _bgNoise(271);
  var maxDim = Math.max(bw, bh);

  // ===== Pass 1: Noise-based volumetric nebula (ImageData for per-pixel control) =====
  var imgData = g.getImageData(0, 0, bw, bh);
  var px = imgData.data;

  for (var y = 0; y < bh; y++) {
    for (var x = 0; x < bw; x++) {
      var idx = (y * bw + x) * 4;
      var nx = x / maxDim, ny = y / maxDim;
      var cx0 = bw * 0.5, cy0 = bh * 0.5;
      var dx = x - cx0, dy = y - cy0;
      var dist = Math.sqrt(dx * dx + dy * dy) / maxDim;
      var ang = Math.atan2(dy, dx);

      // Galactic core glow (warm center)
      var coreGlow = Math.exp(-dist * dist * 18) * 0.35;
      var coreR = coreGlow * 0.55;
      var coreG = coreGlow * 0.32;
      var coreB = coreGlow * 0.65;

      // Spiral arm structure (2 main arms + 2 faint)
      var spiralN1 = _bgFbm(noise1, nx * 3.5, ny * 3.5, 4);
      var armAngle1 = ang + dist * 6.0 + spiralN1 * 1.2;
      var arm1 = Math.pow(Math.max(0, Math.cos(armAngle1 * 1.0)), 6) * Math.exp(-dist * 2.5) * 0.3;

      var spiralN2 = _bgFbm(noise2, nx * 4.0 + 5, ny * 4.0 + 5, 4);
      var armAngle2 = ang + dist * 5.0 + Math.PI + spiralN2 * 1.0;
      var arm2 = Math.pow(Math.max(0, Math.cos(armAngle2 * 1.0)), 6) * Math.exp(-dist * 2.8) * 0.22;

      var arm3 = Math.pow(Math.max(0, Math.cos(armAngle1 * 1.0 + Math.PI * 0.5)), 8) * Math.exp(-dist * 3.5) * 0.1;
      var arm4 = Math.pow(Math.max(0, Math.cos(armAngle2 * 1.0 + Math.PI * 0.5)), 8) * Math.exp(-dist * 3.5) * 0.08;

      var arms = arm1 + arm2 + arm3 + arm4;

      // Fractal noise nebula clouds (multiple scales)
      var neb1 = _bgFbm(noise1, nx * 5, ny * 5, 5);
      var neb2 = _bgFbm(noise2, nx * 7 + 10, ny * 7 + 10, 4);
      var neb3 = _bgFbm(noise3, nx * 3, ny * 3, 3);

      // Nebula color channels (purple/blue dominant with warm accents)
      var nebR = neb1 * 0.08 + arms * 0.4;
      var nebG = neb2 * 0.04 + arms * 0.15;
      var nebB = neb3 * 0.12 + arms * 0.55;

      // Warm emission regions (scattered pockets)
      var emission1 = _bgFbm(noise3, nx * 8 + 20, ny * 8, 3);
      var emissionMask = Math.pow(Math.max(0, emission1 - 0.52), 2) * 15;
      nebR += emissionMask * 0.55;
      nebG += emissionMask * 0.12;
      nebB += emissionMask * 0.20;

      // Cool blue emission regions
      var emission2 = _bgFbm(noise1, nx * 9 + 50, ny * 9 + 30, 3);
      var emMask2 = Math.pow(Math.max(0, emission2 - 0.55), 2) * 12;
      nebR += emMask2 * 0.08;
      nebG += emMask2 * 0.25;
      nebB += emMask2 * 0.55;

      // Hydrogen-alpha red wisps
      var hAlpha = _bgFbm(noise2, nx * 12 + 40, ny * 12 + 15, 3);
      var hMask = Math.pow(Math.max(0, hAlpha - 0.56), 2) * 10;
      nebR += hMask * 0.45;
      nebG += hMask * 0.06;
      nebB += hMask * 0.10;

      // Dark nebula / absorption (subtract light in patches)
      var dark1 = _bgFbm(noise3, nx * 6 + 100, ny * 6 + 100, 4);
      var darkMask = Math.pow(Math.max(0, dark1 - 0.48), 1.5) * 4;

      // Dust lanes (multiple thin bands at various angles)
      var lane1Y = dx * Math.sin(-0.25) + dy * Math.cos(-0.25);
      var dustLane1 = Math.exp(-lane1Y * lane1Y / (bh * bh * 0.003)) * 0.35;
      var lane2Y = dx * Math.sin(0.8) + dy * Math.cos(0.8);
      var dustLane2 = Math.exp(-lane2Y * lane2Y / (bh * bh * 0.006)) * 0.15;
      var lane3Y = dx * Math.sin(-1.2) + dy * Math.cos(-1.2);
      var dustLane3 = Math.exp(-lane3Y * lane3Y / (bh * bh * 0.008)) * 0.10;
      var dustTotal = dustLane1 + dustLane2 + dustLane3;

      // Compose all channels
      var r = (5 + (coreR + nebR) * 255 * (1 - darkMask * 0.7) * (1 - dustTotal * 0.6));
      var gv = (8 + (coreG + nebG) * 255 * (1 - darkMask * 0.8) * (1 - dustTotal * 0.7));
      var b = (16 + (coreB + nebB) * 255 * (1 - darkMask * 0.6) * (1 - dustTotal * 0.5));

      // Distance falloff (brighter near center)
      var distFade = 1 - Math.pow(dist * 1.1, 1.8) * 0.7;
      if (distFade < 0.15) distFade = 0.15;
      r *= distFade;
      gv *= distFade;
      b *= distFade;

      px[idx] = Math.min(255, Math.max(0, r | 0));
      px[idx + 1] = Math.min(255, Math.max(0, gv | 0));
      px[idx + 2] = Math.min(255, Math.max(0, b | 0));
    }
  }
  g.putImageData(imgData, 0, 0);

  // ===== Pass 2: Overlay gradient nebula clouds for extra richness =====
  g.globalCompositeOperation = 'lighter';
  var clouds = [
    // Galactic core secondary glow
    [0.50,0.50,0.18,[[0,'rgba(120,70,160,0.12)'],[0.3,'rgba(70,35,100,0.05)'],[1,'rgba(5,8,16,0)']]],
    [0.50,0.50,0.12,[[0,'rgba(160,90,60,0.06)'],[0.4,'rgba(90,45,30,0.02)'],[1,'rgba(5,8,16,0)']]],
    // Spiral arm glow overlays
    [0.20,0.30,0.42,[[0,'rgba(50,30,110,0.09)'],[0.35,'rgba(28,16,60,0.04)'],[1,'rgba(5,8,16,0)']]],
    [0.75,0.25,0.38,[[0,'rgba(25,55,120,0.07)'],[0.4,'rgba(14,32,65,0.03)'],[1,'rgba(5,8,16,0)']]],
    [0.30,0.75,0.35,[[0,'rgba(65,25,95,0.07)'],[0.4,'rgba(32,12,48,0.025)'],[1,'rgba(5,8,16,0)']]],
    [0.80,0.70,0.32,[[0,'rgba(80,30,70,0.06)'],[0.4,'rgba(40,15,35,0.02)'],[1,'rgba(5,8,16,0)']]],
    // Scattered color accents
    [0.15,0.60,0.25,[[0,'rgba(20,65,105,0.06)'],[0.5,'rgba(10,35,60,0.02)'],[1,'rgba(5,8,16,0)']]],
    [0.85,0.45,0.22,[[0,'rgba(95,25,50,0.05)'],[0.5,'rgba(50,12,28,0.015)'],[1,'rgba(5,8,16,0)']]],
    [0.60,0.15,0.28,[[0,'rgba(30,50,100,0.05)'],[0.5,'rgba(15,28,55,0.015)'],[1,'rgba(5,8,16,0)']]],
    [0.40,0.85,0.22,[[0,'rgba(90,35,60,0.04)'],[0.5,'rgba(45,18,32,0.012)'],[1,'rgba(5,8,16,0)']]]
  ];
  for (var i = 0; i < clouds.length; i++) {
    var cl = clouds[i], ccx = cl[0]*bw, ccy = cl[1]*bh, r = cl[2]*maxDim;
    var grad = g.createRadialGradient(ccx,ccy,0,ccx,ccy,r);
    for (var j = 0; j < cl[3].length; j++) grad.addColorStop(cl[3][j][0], cl[3][j][1]);
    g.fillStyle = grad; g.fillRect(0,0,bw,bh);
  }

  // ===== Pass 3: Star-forming regions (bright blue-white knots near spiral arms) =====
  var sfSeed = 97;
  function sfr() { sfSeed = (sfSeed * 16807) % 2147483647; return (sfSeed - 1) / 2147483646; }
  var sfRegions = 12;
  for (var i = 0; i < sfRegions; i++) {
    var sfx = sfr() * bw, sfy = sfr() * bh;
    var sdx = sfx - bw * 0.5, sdy = sfy - bh * 0.5;
    var sDist = Math.sqrt(sdx * sdx + sdy * sdy) / maxDim;
    if (sDist > 0.45 || sDist < 0.03) continue;
    var sAng = Math.atan2(sdy, sdx);
    var armCheck = Math.cos(sAng + sDist * 6.0);
    if (armCheck < 0.3) continue;
    var sfRad = (8 + sfr() * 18);
    var sfBr = 0.04 + sfr() * 0.08;
    var sfGrad = g.createRadialGradient(sfx, sfy, 0, sfx, sfy, sfRad);
    sfGrad.addColorStop(0, 'rgba(140,170,255,' + sfBr + ')');
    sfGrad.addColorStop(0.3, 'rgba(80,110,200,' + (sfBr * 0.4) + ')');
    sfGrad.addColorStop(1, 'rgba(30,40,100,0)');
    g.fillStyle = sfGrad;
    g.fillRect(sfx - sfRad, sfy - sfRad, sfRad * 2, sfRad * 2);
  }

  // ===== Pass 4: Dense star field (far background stars) =====
  g.globalCompositeOperation = 'lighter';
  var seed = 42;
  function sr() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }

  // Layer 1: Very faint dense field (~800 micro-stars)
  var microCount = Math.round(800 * (bw * bh) / (1920 * 1080));
  for (var i = 0; i < microCount; i++) {
    var sx = sr() * bw, sy = sr() * bh;
    var br = 0.02 + sr() * 0.08;
    var ss = 0.15 + sr() * 0.25;
    g.fillStyle = 'rgba(200,210,240,' + br + ')';
    g.beginPath(); g.arc(sx, sy, ss, 0, Math.PI * 2); g.fill();
  }

  // Layer 2: Star clusters (dense pockets)
  var clusterCount = 6;
  for (var ci = 0; ci < clusterCount; ci++) {
    var clx = sr() * bw, cly = sr() * bh;
    var clRad = 25 + sr() * 45;
    var clStars = 30 + (sr() * 50) | 0;
    for (var si = 0; si < clStars; si++) {
      var ca = sr() * Math.PI * 2;
      var cd = sr() * sr() * clRad;
      var csx = clx + Math.cos(ca) * cd;
      var csy = cly + Math.sin(ca) * cd;
      var cbr = 0.08 + sr() * 0.25;
      var css = 0.2 + sr() * 0.5;
      var ct = sr();
      var cr, cg, cb;
      if (ct < 0.3) { cr = 180 + sr() * 75 | 0; cg = 195 + sr() * 60 | 0; cb = 245 + sr() * 10 | 0; }
      else if (ct < 0.6) { cr = 240 + sr() * 15 | 0; cg = 230 + sr() * 25 | 0; cb = 200 + sr() * 55 | 0; }
      else { cr = 220 + sr() * 35 | 0; cg = 220 + sr() * 35 | 0; cb = 225 + sr() * 30 | 0; }
      g.fillStyle = 'rgba(' + cr + ',' + cg + ',' + cb + ',' + cbr + ')';
      g.beginPath(); g.arc(csx, csy, css, 0, Math.PI * 2); g.fill();
    }
  }

  // Layer 3: Medium stars (~500) with spectral type color
  var medCount = Math.round(500 * (bw * bh) / (1920 * 1080));
  for (var i = 0; i < medCount; i++) {
    var sx = sr() * bw, sy = sr() * bh;
    var isBright = sr() < 0.03;
    var br = isBright ? (0.3 + sr() * 0.55) : (0.04 + sr() * 0.18);
    var ss = isBright ? (0.5 + sr() * 1.6) : (0.2 + sr() * 0.55);
    var ct = sr();
    var cr, cg, cb;
    // Spectral types: O/B blue, A white, F yellow-white, G yellow, K orange, M red
    if (ct < 0.15) { cr = 155 + sr() * 50 | 0; cg = 175 + sr() * 50 | 0; cb = 240 + sr() * 15 | 0; } // O/B
    else if (ct < 0.30) { cr = 200 + sr() * 55 | 0; cg = 210 + sr() * 45 | 0; cb = 240 + sr() * 15 | 0; } // A
    else if (ct < 0.50) { cr = 240 + sr() * 15 | 0; cg = 230 + sr() * 25 | 0; cb = 195 + sr() * 40 | 0; } // F
    else if (ct < 0.65) { cr = 245 + sr() * 10 | 0; cg = 220 + sr() * 30 | 0; cb = 150 + sr() * 55 | 0; } // G
    else if (ct < 0.80) { cr = 240 + sr() * 15 | 0; cg = 180 + sr() * 40 | 0; cb = 120 + sr() * 50 | 0; } // K
    else if (ct < 0.90) { cr = 230 + sr() * 25 | 0; cg = 140 + sr() * 40 | 0; cb = 110 + sr() * 35 | 0; } // M
    else { cr = 185 + sr() * 70 | 0; cg = 190 + sr() * 65 | 0; cb = 210 + sr() * 45 | 0; } // misc
    g.fillStyle = 'rgba(' + cr + ',' + cg + ',' + cb + ',' + br + ')';
    g.beginPath(); g.arc(sx, sy, ss, 0, Math.PI * 2); g.fill();
    if (isBright) {
      // Diffraction spikes (cross pattern)
      var spLen = ss * 2.5 + sr() * 4;
      g.strokeStyle = 'rgba(' + cr + ',' + cg + ',' + cb + ',' + (br * 0.22) + ')';
      g.lineWidth = 0.3;
      g.beginPath(); g.moveTo(sx - spLen, sy); g.lineTo(sx + spLen, sy); g.stroke();
      g.beginPath(); g.moveTo(sx, sy - spLen * 0.7); g.lineTo(sx, sy + spLen * 0.7); g.stroke();
      // Airy disk glow
      var airyGrad = g.createRadialGradient(sx, sy, 0, sx, sy, ss * 3);
      airyGrad.addColorStop(0, 'rgba(' + cr + ',' + cg + ',' + cb + ',' + (br * 0.15) + ')');
      airyGrad.addColorStop(0.5, 'rgba(' + cr + ',' + cg + ',' + cb + ',' + (br * 0.04) + ')');
      airyGrad.addColorStop(1, 'rgba(' + cr + ',' + cg + ',' + cb + ',0)');
      g.fillStyle = airyGrad;
      g.beginPath(); g.arc(sx, sy, ss * 3, 0, Math.PI * 2); g.fill();
    }
  }

  // ===== Pass 5: Distant Galaxy (small tilted spiral) =====
  g.globalCompositeOperation = 'lighter';
  var gx = bw * 0.05, gy = bh * 0.52;
  g.save();
  g.translate(gx, gy);
  g.rotate(0.4);
  g.scale(1, 0.45);
  // Core
  var galGrad = g.createRadialGradient(0, 0, 0, 0, 0, 18);
  galGrad.addColorStop(0, 'rgba(200,180,220,0.12)');
  galGrad.addColorStop(0.3, 'rgba(140,120,180,0.06)');
  galGrad.addColorStop(0.7, 'rgba(90,70,140,0.02)');
  galGrad.addColorStop(1, 'rgba(50,30,90,0)');
  g.fillStyle = galGrad;
  g.beginPath(); g.arc(0, 0, 18, 0, Math.PI * 2); g.fill();
  // Spiral arms (simplified)
  for (var ai = 0; ai < 2; ai++) {
    g.strokeStyle = 'rgba(160,140,200,' + (0.04 + ai * 0.01) + ')';
    g.lineWidth = 1.5;
    g.beginPath();
    for (var t = 0; t < 4; t += 0.05) {
      var sa = t * 2.2 + ai * Math.PI;
      var sr3 = 2 + t * 5;
      var sx = Math.cos(sa) * sr3, sy = Math.sin(sa) * sr3;
      if (t === 0) g.moveTo(sx, sy); else g.lineTo(sx, sy);
    }
    g.stroke();
  }
  g.restore();

  // Second distant galaxy (edge-on, like a lens)
  var gx2 = bw * 0.72, gy2 = bh * 0.06;
  g.save();
  g.translate(gx2, gy2);
  g.rotate(-0.3);
  g.scale(1, 0.15);
  var galGrad2 = g.createRadialGradient(0, 0, 0, 0, 0, 22);
  galGrad2.addColorStop(0, 'rgba(180,170,210,0.10)');
  galGrad2.addColorStop(0.4, 'rgba(120,110,160,0.04)');
  galGrad2.addColorStop(1, 'rgba(60,50,100,0)');
  g.fillStyle = galGrad2;
  g.beginPath(); g.arc(0, 0, 22, 0, Math.PI * 2); g.fill();
  // Central dust lane
  g.globalCompositeOperation = 'source-over';
  g.fillStyle = 'rgba(5,8,16,0.15)';
  g.fillRect(-22, -1, 44, 2);
  g.restore();
  g.globalCompositeOperation = 'source-over';

  // ===== Pass 7: Vignette =====
  g.globalCompositeOperation = 'source-over';
  var vg = g.createRadialGradient(bw / 2, bh / 2, bw * 0.1, bw / 2, bh / 2, bw * 0.65);
  vg.addColorStop(0, 'rgba(5,8,16,0)');
  vg.addColorStop(0.5, 'rgba(5,8,16,0)');
  vg.addColorStop(0.8, 'rgba(4,6,12,0.35)');
  vg.addColorStop(1, 'rgba(2,3,8,0.7)');
  g.fillStyle = vg; g.fillRect(0, 0, bw, bh);

  if (bgSprite.texture !== PIXI.Texture.EMPTY) bgSprite.texture.destroy(true);
  bgSprite.texture = PIXI.Texture.from(c);
  bgSprite.width = screenW;
  bgSprite.height = screenH;
}

// ===== Animated Sky =====
var STAR_COLORS = [0xd0d8ff, 0xeef0ff, 0xffe8d0, 0xddccff, 0xcce8ff, 0xffd0d0, 0xc8e0ff];
var SHOOT_COLORS = [0xeef0ff, 0xdde4ff, 0xffe8d0, 0xeeccff, 0xffffff, 0xaaccff];

var NEBULA_DRIFT_TINTS = [0x5a37a0, 0x2244aa, 0x6a2888, 0x883868, 0x224488, 0x443388, 0x884468, 0x2a5588, 0x663388];

function buildSky() {
  var old;
  old = nebulaLayer.removeChildren(); for (var i = 0; i < old.length; i++) old[i].destroy();
  old = starLayer.removeChildren(); for (var i = 0; i < old.length; i++) old[i].destroy();
  old = dustLayer.removeChildren(); for (var i = 0; i < old.length; i++) old[i].destroy();
  old = shootHeadLayer.removeChildren(); for (var i = 0; i < old.length; i++) old[i].destroy();

  stars = [];
  dustParts = [];
  nebulaDrifts = [];
  shootPool = [];

  // Nebula drift sprites — large soft blobs that slowly move and pulse
  for (var i = 0; i < NEBULA_DRIFT_COUNT; i++) {
    var spr = new PIXI.Sprite(nebulaDriftTex);
    spr.anchor.set(0.5);
    spr.blendMode = PIXI.BLEND_MODES.ADD;
    var size = 180 + Math.random() * 350;
    spr.scale.set(size / 256);
    spr.tint = NEBULA_DRIFT_TINTS[Math.random() * NEBULA_DRIFT_TINTS.length | 0];
    spr.position.set(Math.random() * screenW, Math.random() * screenH);
    spr.rotation = Math.random() * Math.PI * 2;
    nebulaLayer.addChild(spr);
    nebulaDrifts.push({
      sprite: spr,
      baseX: spr.x, baseY: spr.y,
      vx: (Math.random() - 0.5) * 3,
      vy: (Math.random() - 0.5) * 2.5,
      baseAlpha: 0.015 + Math.random() * 0.04,
      freq: 0.03 + Math.random() * 0.08,
      phase: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.02,
      scaleFreq: 0.015 + Math.random() * 0.04,
      scalePhase: Math.random() * Math.PI * 2,
      baseScale: spr.scale.x
    });
  }

  for (var i = 0; i < STAR_COUNT; i++) {
    var spr = new PIXI.Sprite(starTex);
    spr.anchor.set(0.5);
    spr.blendMode = PIXI.BLEND_MODES.ADD;
    var size = 0.5 + Math.random() * 2.5;
    // Some larger bright stars
    if (Math.random() < 0.04) size = 2.5 + Math.random() * 2.0;

    stars.push({
      sprite: spr,
      baseAlpha: 0.12 + Math.random() * 0.68,
      freq: 0.15 + Math.random() * 4.5,
