<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Engram</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07080d;color:#c8ccd4;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{width:360px;padding:40px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;text-align:center}
h1{font-size:22px;font-weight:600;color:#e2e4e9;margin-bottom:4px}
h1 span{color:#6366f1}
.sub{font-size:13px;color:#555;margin-bottom:28px}
input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#e2e4e9;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;margin-bottom:16px}
input:focus{border-color:rgba(99,102,241,0.5)}
input::placeholder{color:#444}
button{width:100%;padding:10px;background:#6366f1;color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.2s}
button:hover{background:#4f46e5}
.err{color:#ef4444;font-size:12px;margin-top:8px;display:none}
</style>
</head>
<body>
<div class="card">
<h1>Eng<span>ram</span></h1>
<p class="sub">Memory graph visualization</p>
<form id="loginForm">
<input type="password" id="pw" placeholder="Password" autocomplete="off" autofocus>
<button type="submit">Access</button>
</form>
<div class="err" id="err">Invalid password</div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  try {
    var r = await fetch('/gui/auth', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:document.getElementById('pw').value})});
    if (r.ok) { location.reload(); return; }
    document.getElementById('err').style.display = 'block';
  } catch(x) { document.getElementById('err').style.display = 'block'; }
});
</script>
</body>
</html>
